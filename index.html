/* ══════════════════════════════════════════════════════
   EXPORT / IMPORT (FULL — ALL APPS)
══════════════════════════════════════════════════════ */
function exportAllData() {
  const keys=['tt_entries','tt_clients','tt_designers','tt_projects','tt_invoices','tt_settings','tt_expense_items','tt_expense_invoices','tt_expense_settings','tt_dark_mode','tt_app'];
  const data={_version:2,_exported:new Date().toISOString()};
  keys.forEach(k=>{ const v=localStorage.getItem(k); if(v) data[k]=v; });
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`jja-full-backup-${todayStr()}.json`;a.click();
  URL.revokeObjectURL(a.href);
  toast('Full backup exported');
}
function importAllData(input) {
  const f=input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    try {
      const data=JSON.parse(ev.target.result);
      if(!confirm('Import backup? This will replace all current data.')) return;
      Object.entries(data).forEach(([k,v])=>{ if(!k.startsWith('_')&&v) localStorage.setItem(k,v); });
      toast('Import complete — reloading...');
      setTimeout(()=>location.reload(),1000);
    } catch { toast('Invalid backup file'); }
  };
  r.readAsText(f);
}

/* ══════════════════════════════════════════════════════
   INDEXEDDB — VENDOR FILES (local fallback for old files)
══════════════════════════════════════════════════════ */
let _db = null;
function getDB() {
  if (_db) return Promise.resolve(_db);
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('jja_tracker_db', 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('vendor_files'))
        db.createObjectStore('vendor_files', {keyPath:'id'});
    };
    req.onsuccess = e => { _db = e.target.result; resolve(_db); };
    req.onerror   = e => reject(e.target.error);
  });
}
const idbPut    = data => getDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction('vendor_files','readwrite');tx.objectStore('vendor_files').put(data).onsuccess=e=>res(e.target.result);tx.onerror=e=>rej(e);}));
const idbGet    = id   => getDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction('vendor_files','readonly');tx.objectStore('vendor_files').get(id).onsuccess=e=>res(e.target.result);tx.onerror=e=>rej(e);}));
const idbGetAll = ()   => getDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction('vendor_files','readonly');tx.objectStore('vendor_files').getAll().onsuccess=e=>res(e.target.result);tx.onerror=e=>rej(e);}));
const idbDelete = id   => getDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction('vendor_files','readwrite');tx.objectStore('vendor_files').delete(id).onsuccess=()=>res();tx.onerror=e=>rej(e);}));

async function uploadToSupabase(itemId, fileData) {

  const safeName = name.replace(/[^a-zA-Z0-9.\-_]/g, '_');
  const path = `${itemId}/${Date.now()}-${safeName}`;

  const { error } = await _sb.storage.from(SUPABASE_BUCKET).upload(path, file, {

  });

  updateExpItem(itemId, { hasFile: true, hasPdf: true, fileName: name, fileType: type, fileUrl: null, filePath: path });

async function getSignedUrl(filePath) {
  if(!_sb || !filePath) return null;
  const { data, error } = await _sb.storage.from(SUPABASE_BUCKET).createSignedUrl(filePath, 3600);
  if(error) { console.error('Signed URL error:', error); return null; }

}

window.viewExpFile = async id => {
  const item = loadExpItems().find(i=>i.id===id);

  // Resolve the URL: prefer signed URL (private bucket), fall back to stored public URL (legacy)
  let url = null;
  if(item?.filePath) {
    toast('Loading…');
    url = await getSignedUrl(item.filePath);
    if(!url){ toast('Could not load file — please try again'); return; }
  } else if(item?.fileUrl) {
    url = item.fileUrl;
  }

  if(url) {
    const ext=(item.fileName||'').split('.').pop().toLowerCase();
    if(['jpg','jpeg','png','gif','webp','heic'].includes(ext)){
      showModal(`<div class="modal-hd"><h2>📎 ${esc(item.fileName)}</h2><button class="modal-x" onclick="closeModal()">×</button></div><img src="${url}" style="width:100%;border-radius:6px;margin-top:4px"><div class="form-actions" style="margin-top:12px"><button class="btn btn-ghost" onclick="closeModal()">Close</button><a class="btn btn-dark" href="${url}" download="${esc(item.fileName)}" target="_blank">Download</a></div>`);
    } else if(ext==='pdf'||item.fileType==='application/pdf'){
      showPDFPreview(url, item.fileName||'Attachment', item.fileName||'attachment.pdf');
    } else {
      window.open(url,'_blank');
    }
    return;
  }

  // Fallback: IndexedDB (locally stored legacy files)
  const file=await idbGet(id);
  if(!file){toast('Attachment not found');return;}
  if(file.type&&file.type.startsWith('image/')){
    showModal(`<div class="modal-hd"><h2>📎 ${esc(file.name)}</h2><button class="modal-x" onclick="closeModal()">×</button></div><img src="${file.data}" style="width:100%;border-radius:6px;margin-top:4px"><div class="form-actions" style="margin-top:12px"><button class="btn btn-ghost" onclick="closeModal()">Close</button><button class="btn btn-dark" onclick="downloadAttachment('${id}')">Download</button></div>`);
  } else if(file.type==='application/pdf'||file.name?.endsWith('.pdf')){
    showPDFPreview(file.data, file.name||'Attachment', file.name||'attachment.pdf');

    downloadAttachment(id, file);

function fileBadgeHtml(item) {
  if(!item.hasPdf&&!item.hasFile) return '';
  return `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">
    <button class="btn btn-ghost btn-sm" onclick="viewExpFile('${item.id}')">👁 Preview File</button>
    <button class="btn btn-ghost btn-sm" onclick="downloadAttachment('${item.id}')">⬇ Download File</button>
  </div>`;
}

function saveExpItemForm(editId) {
  const clientId  = document.getElementById('ei-cli').value;
  const projectId = document.getElementById('ei-proj').value;
  const vendorName= document.getElementById('ei-vendor').value.trim();
  const description=document.getElementById('ei-desc').value.trim();
  const category  = document.getElementById('ei-cat').value;
  const vendorAmount=parseFloat(document.getElementById('ei-amt').value);
  const markupPct = parseFloat(document.getElementById('ei-markup').value)||0;
  const adminFeePct=parseFloat(document.getElementById('ei-admin').value)||0;
  const date      = document.getElementById('ei-date').value;
  if(!clientId||!vendorName||!description||isNaN(vendorAmount)||vendorAmount<0){toast('Please fill in all required fields');return;}

  const payload={clientId,projectId,vendorName,description,category,vendorAmount,markupPct,adminFeePct,date};
  if(editId) { updateExpItem(editId,payload); }
  else       { addExpItem(payload); }

  // Upload attachment to Supabase if pending
  if(_pendingFileData){
    const itemId=editId||loadExpItems().slice(-1)[0]?.id;
    if(itemId){
      const fd=_pendingFileData;
      uploadToSupabase(itemId, fd).catch(err=>{
        console.error('Supabase upload failed:', err);
        const msg = err?.message||err?.error_description||err?.statusCode||String(err);
        alert(`File upload failed:\n\n${msg}\n\nCheck the browser console for details, and verify your Supabase storage bucket policies.`);
      });
    }
    _pendingFileData=null;
  }
  toast(editId?'Item updated':'Expense item added');
  closeModal();
  renderExpItems();
}

function renderExpItems() {
  const clients=loadClients();
  document.getElementById('app').innerHTML=`
    <div class="page-head"><div><h1>Expense Items</h1><div class="sub">Track purchases, materials, and services by client &amp; project</div></div><button class="btn btn-gold" onclick="openExpItemModal('')">+ Add Item</button></div>

      <label class="field-label">Client</label>
      <select id="exp-f-cli" onchange="rebuildExpItems();refreshExpFilterProj(this.value)">${clientOpts('','All Clients')}</select>
      <label class="field-label">Project</label>
      <select id="exp-f-proj" onchange="rebuildExpItems()">${allProjectOpts('','All Projects')}</select>
      <div class="sep"></div>
      <label class="field-label">Status</label>
      <select id="exp-f-status" onchange="rebuildExpItems()">
        <option value="">All</option><option value="filed">Filed (Unbilled)</option><option value="billed">Billed</option>
      </select>
      <label class="field-label">Category</label>
      <select id="exp-f-cat" onchange="rebuildExpItems()">
        <option value="">All Categories</option>
        <option value="furniture">Furniture</option><option value="fabric">Fabric</option>
        <option value="contractor">Contractor</option><option value="upholstery">Upholstery</option>
        <option value="storage">Storage</option><option value="shipping">Shipping</option>
        <option value="other">Other</option>
      </select>
      <input type="text" id="exp-f-q" placeholder="Search…" oninput="rebuildExpItems()">
    </div>
    <div id="exp-items-body"></div>`;

  window.refreshExpFilterProj = cliId => {
    const projs=cliId?getProjectsByClient(cliId):loadProjects();
    const sel=document.getElementById('exp-f-proj');
    sel.innerHTML=`<option value="">All Projects</option>`+projs.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
  };

  window.rebuildExpItems = () => {
    const cliId  = document.getElementById('exp-f-cli').value;
    const projId = document.getElementById('exp-f-proj').value;
    const status = document.getElementById('exp-f-status').value;
    const cat    = document.getElementById('exp-f-cat').value;
    const q      = (document.getElementById('exp-f-q').value||'').toLowerCase();
    let items=loadExpItems();
    if(cliId)  items=items.filter(i=>i.clientId===cliId);
    if(projId) items=items.filter(i=>i.projectId===projId);
    if(status) items=items.filter(i=>i.status===status);
    if(cat)    items=items.filter(i=>i.category===cat);
    if(q)      items=items.filter(i=>[i.vendorName,i.description,i.category].join(' ').toLowerCase().includes(q));
    items=[...items].sort((a,b)=>(b.date||'').localeCompare(a.date||''));

    const el=document.getElementById('exp-items-body');
    if(!items.length){
      el.innerHTML=`<div class="empty"><div class="e-icon">◧</div><p>No expense items yet.</p><button class="btn btn-gold" onclick="openExpItemModal('')">+ Add Item</button></div>`;
      return;
    }
    const totalClient=items.reduce((s,i)=>s+calcItem(i).clientTotal,0);
    const totalVendor=items.reduce((s,i)=>s+i.vendorAmount,0);

    el.innerHTML=items.map(item=>{
      const c=calcItem(item);
      const catCls=CAT_COLORS[item.category]||'badge-category-other';
      const catLbl=CAT_LABELS[item.category]||'Other';
      const client=getClientById(item.clientId), proj=item.projectId?getProjectById(item.projectId):null;
      return `<div class="exp-item-card${item.status==='billed'?' billed':''}">
        <div class="exp-item-left">
          <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">
            <span class="badge ${catCls}">${catLbl}</span>
            <span class="badge ${item.status==='billed'?'badge-billed':'badge-filed'}">${item.status==='billed'?'Billed':'Filed'}</span>
            ${item.date?`<span class="col2 fs12">${fmtDate(item.date)}</span>`:''}
          </div>
          <div class="exp-item-vendor">${esc(item.vendorName)}</div>
          <div class="exp-item-desc">${esc(item.description)}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:4px">${esc(client?.name||'?')}${proj?` · ${esc(proj.name)}`:''}</div>
          ${item.markupPct>0||item.adminFeePct>0?`<div class="exp-markup-info">Markup ${item.markupPct}%${item.adminFeePct>0?` · Admin ${item.adminFeePct}%`:''}</div>`:''}
        </div>
        <div class="exp-item-right">
          <div class="exp-client-total">${cur(c.clientTotal)}</div>
          <div class="exp-vendor-price">Vendor: ${cur(item.vendorAmount)}</div>
          <div style="margin-top:10px;display:flex;flex-direction:column;gap:5px;align-items:flex-end">
            <button class="btn btn-ghost btn-sm" onclick="openExpItemModal('${item.id}')">Edit</button>
            ${(item.hasPdf||item.hasFile)?fileBadgeHtml(item):''}
            <button class="btn btn-danger btn-sm" onclick="confirmDelExpItem('${item.id}')">Delete</button>
          </div>
        </div>
      </div>`;
    }).join('')+`<div class="card" style="text-align:right;padding:12px 20px"><span class="col2 fs12">Vendor Total &nbsp;</span><strong>${cur(totalVendor)}</strong>&nbsp;&nbsp;<span class="col2 fs12">Client Total &nbsp;</span><span class="gold-txt" style="font-size:17px"><strong>${cur(totalClient)}</strong></span></div>`;
  };
  rebuildExpItems();
}

window.confirmDelExpItem = id => {
  if(confirm('Delete this expense item?')){
    const item = getExpItemById(id);
    if(item?.filePath) deleteSupabaseFile(item.filePath);
    deleteExpItem(id);
    toast('Item deleted');
    renderExpItems();
  }
};

function _getExpInvItems(inv) {
  const live=(inv.itemIds||[]).map(id=>getExpItemById(id)).filter(Boolean);
  return live.length ? live : (inv.items||[]);
}

function buildClientExpPDFDoc(inv) {
  const c=getClientById(inv.clientId), proj=inv.projectId?getProjectById(inv.projectId):null;
  const s=loadSettings();
  const items=_getExpInvItems(inv);
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'letter'});
  const PW=215.9,M=20,R=PW-M;

  // Firm header
  doc.setFontSize(18);doc.setFont('helvetica','bold');doc.setTextColor(20,20,18);
  doc.text(s.firmName||'Your Firm',M,26);
  let iy=32;
  if(s.firmAddress){doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(100,100,95);doc.text(s.firmAddress,M,iy);iy+=5;}
  if(s.firmEmail){doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(100,100,95);doc.text(s.firmEmail,M,iy);}

  // Invoice label
  doc.setFontSize(22);doc.setFont('helvetica','bold');doc.setTextColor(196,168,122);
  doc.text('INVOICE',R,26,{align:'right'});
  doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(100,100,95);
  doc.text(`Invoice #: ${inv.invoiceNumber}`,R,33,{align:'right'});
  doc.text(`Date: ${fmtDateLong(inv.generatedAt.split('T')[0])}`,R,38,{align:'right'});
  const dueD=new Date(inv.generatedAt); dueD.setDate(dueD.getDate()+(s.paymentTerms||14));
  doc.text(`Due: ${fmtDateLong(dueD.toISOString().split('T')[0])}`,R,43,{align:'right'});

  doc.setDrawColor(220,215,205);doc.setLineWidth(0.4);doc.line(M,52,R,52);

  // Bill To
  doc.setFontSize(7.5);doc.setFont('helvetica','bold');doc.setTextColor(130,125,118);doc.text('BILL TO',M,59);
  doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(20,20,18);doc.text(c?.name||'?',M,65);
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(90,85,80);
  let by=71;
  if(c?.contactName){doc.text(c.contactName,M,by);by+=5;}
  if(c?.email){doc.text(c.email,M,by);}
  if(proj){doc.setFontSize(8.5);doc.setTextColor(90,85,80);doc.text(`Project: ${proj.name}`,R,65,{align:'right'});}

  // Items table
  let total=0;
  const body=items.map(item=>{
    const ct=item.vendorAmount!=null?calcItem(item).clientTotal:item.clientTotal;
    total+=ct;
    return[item.date?fmtDate(item.date):'',CAT_LABELS[item.category]||item.category||'',item.description||'',cur(ct)];
  });
  doc.autoTable({startY:88,head:[['Date','Category','Description','Amount']],body,
    margin:{left:M,right:M},
    styles:{fontSize:8.5,cellPadding:3.5,textColor:[30,28,24]},
    headStyles:{fillColor:[30,28,24],textColor:[255,255,255],fontStyle:'bold',fontSize:8},
    columnStyles:{0:{cellWidth:24},1:{cellWidth:26},2:{cellWidth:'auto',overflow:'linebreak'},3:{cellWidth:28,halign:'right'}},
    alternateRowStyles:{fillColor:[249,248,245]}});

  const aft=doc.lastAutoTable.finalY+8;
  doc.setFontSize(12);doc.setFont('helvetica','bold');doc.setTextColor(20,20,18);
  doc.text('Total Due:',R-40,aft+10);
  doc.setTextColor(168,140,94);doc.text(cur(total),R,aft+10,{align:'right'});

  doc.setDrawColor(220,215,205);doc.line(M,256,R,256);
  doc.setFontSize(8);doc.setFont('helvetica','italic');doc.setTextColor(160,155,148);
  doc.text(`Thank you for your business. Payment due within ${s.paymentTerms||14} days.`,PW/2,261,{align:'center'});
  doc.setFontSize(6.5);doc.setFont('helvetica','normal');doc.setTextColor(195,190,183);
  doc.text('Billed via jasejonesinvoicing.com',PW/2,268,{align:'center'});

  return doc;
}

function buildInternalExpPDFDoc(inv) {
  const c=getClientById(inv.clientId), proj=inv.projectId?getProjectById(inv.projectId):null;
  const s=loadSettings();
  const items=_getExpInvItems(inv);
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'letter'});
  const PW=215.9,M=16,R=PW-M;

  // Header row
  doc.setFontSize(15);doc.setFont('helvetica','bold');doc.setTextColor(20,20,18);
  doc.text(s.firmName||'Your Firm',M,20);
  doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(139,60,60);
  doc.text('INTERNAL COST BREAKDOWN',R,20,{align:'right'});

  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(100,100,95);
  doc.text(`Ref: ${inv.invoiceNumber}  ·  ${fmtDateLong(inv.generatedAt.split('T')[0])}`,M,27);

  // Red warning banner
  doc.setFillColor(251,235,232);doc.roundedRect(M,31,R-M,10,1,1,'F');
  doc.setFontSize(7.5);doc.setFont('helvetica','bold');doc.setTextColor(139,60,60);
  doc.text('INTERNAL USE ONLY — DO NOT DISTRIBUTE TO CLIENT',PW/2,37.5,{align:'center'});

  // Client / project
  doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(20,20,18);
  doc.text(c?.name||'?',M,48);
  doc.setFont('helvetica','normal');doc.setTextColor(90,85,80);
  if(proj){doc.text(`Project: ${proj.name}`,M,54);}

  // Table
  let totV=0,totM=0,totA=0,totC=0;
  const body=items.map(item=>{
    const calc=item.vendorAmount!=null
      ? calcItem(item)
      : {vendorAmount:item.clientTotal,markupAmt:0,adminAmt:0,clientTotal:item.clientTotal};
    totV+=calc.vendorAmount;totM+=calc.markupAmt;totA+=calc.adminAmt;totC+=calc.clientTotal;
    return[
      item.vendorName||'—',
      CAT_LABELS[item.category]||item.category||'—',
      item.description||'',
      item.date?fmtDate(item.date):'—',
      cur(calc.vendorAmount),
      item.markupPct?`${item.markupPct}%`:'—',
      item.adminFeePct?`${item.adminFeePct}%`:'—',
      cur(calc.clientTotal)
    ];
  });
  const startY=proj?60:54;
  doc.autoTable({
    startY,
    head:[['Vendor','Category','Description','Date','Vendor $','Markup','Admin','Client $']],
    body,
    margin:{left:M,right:M},
    styles:{fontSize:7.5,cellPadding:2.5,textColor:[30,28,24]},
    headStyles:{fillColor:[139,60,60],textColor:[255,255,255],fontStyle:'bold',fontSize:7},
    columnStyles:{
      0:{cellWidth:28},1:{cellWidth:20},2:{cellWidth:'auto',overflow:'linebreak'},
      3:{cellWidth:18},4:{cellWidth:20,halign:'right'},
      5:{cellWidth:14,halign:'right'},6:{cellWidth:14,halign:'right'},7:{cellWidth:22,halign:'right'}
    },
    alternateRowStyles:{fillColor:[249,248,245]}
  });

  // Totals box
  const aft=doc.lastAutoTable.finalY+6;
  const boxH=10+(totM>0?6:0)+(totA>0?6:0)+8;
  doc.setFillColor(249,248,245);doc.roundedRect(R-72,aft,72,boxH,1,1,'F');
  doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(100,100,95);
  let ty=aft+7;
  doc.text('Vendor Total:',R-70,ty);doc.setTextColor(20,20,18);doc.text(cur(totV),R-2,ty,{align:'right'});
  if(totM>0){ty+=6;doc.setTextColor(100,100,95);doc.text('+ Markup:',R-70,ty);doc.setTextColor(20,20,18);doc.text(cur(totM),R-2,ty,{align:'right'});}
  if(totA>0){ty+=6;doc.setTextColor(100,100,95);doc.text('+ Admin Fees:',R-70,ty);doc.setTextColor(20,20,18);doc.text(cur(totA),R-2,ty,{align:'right'});}
  ty+=9;doc.setFontSize(9.5);doc.setFont('helvetica','bold');doc.setTextColor(168,140,94);
  doc.text('Client Total:',R-70,ty);doc.text(cur(totC),R-2,ty,{align:'right'});

  // Footer
  doc.setDrawColor(220,215,205);doc.line(M,256,R,256);
  doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(139,60,60);
  doc.text('CONFIDENTIAL — FOR INTERNAL USE ONLY',PW/2,261,{align:'center'});
  doc.setFontSize(6.5);doc.setFont('helvetica','normal');doc.setTextColor(195,190,183);
  doc.text('Billed via jasejonesinvoicing.com',PW/2,267,{align:'center'});

  return doc;
}

function renderExpInvoices() {
  const invoices=[...loadExpInvoices()].sort((a,b)=>b.generatedAt.localeCompare(a.generatedAt));
  document.getElementById('app').innerHTML=`
    <div class="page-head"><div><h1>Expense Invoices</h1><div class="sub">All generated expense invoices</div></div></div>
    <div class="filters">
      <label class="field-label">Client</label>
      <select id="exinv-f-cli" onchange="rebuildExpInvList()">${clientOpts('','All Clients')}</select>
    </div>
    <div id="exp-inv-list"></div>`;

  window.rebuildExpInvList = () => {
    const cliId=document.getElementById('exinv-f-cli').value;
    const list=invoices.filter(i=>!cliId||i.clientId===cliId);
    const el=document.getElementById('exp-inv-list');
    if(!list.length){
      el.innerHTML=`<div class="empty"><div class="e-icon">◻</div><p>No expense invoices yet.</p><button class="btn btn-gold" onclick="navigate('#exp-generate')">Generate First Invoice</button></div>`;
      return;
    }
    el.innerHTML=list.map(inv=>{
      const c=getClientById(inv.clientId), proj=inv.projectId?getProjectById(inv.projectId):null;
      // Build inline detail rows for the dropdown
      const detailItems=_getExpInvItems(inv);
      const detailRows=detailItems.map(item=>{
        const liveItem=getExpItemById(item.id)||item;
        const hasFile=liveItem.filePath||liveItem.fileUrl||liveItem.hasPdf||liveItem.hasFile;
        return `<div class="exp-inv-detail-row">
          <div class="exp-inv-detail-left">
            <div class="exp-inv-detail-name">${esc(item.description||'')}</div>
            <div class="exp-inv-detail-meta">${esc(item.vendorName||'?')} · ${CAT_LABELS[item.category]||item.category||''}${item.date?` · ${fmtDate(item.date)}`:''}</div>
            ${hasFile?`<div class="exp-inv-file-btn">
              <button class="btn btn-ghost btn-sm" onclick="viewExpFile('${item.id}')">👁 Preview File</button>
              <button class="btn btn-ghost btn-sm" onclick="downloadAttachment('${item.id}')">⬇ Download File</button>
            </div>`:''}
          </div>
          <div class="exp-inv-detail-amount gold-txt">${cur(item.clientTotal)}</div>

      }).join('');

      return `<div class="exp-inv-card">
        <div class="exp-inv-card-hd" onclick="toggleExpInvDetail('${inv.id}',this)">
          <div class="exp-inv-card-info">
            <div class="inv-num">${esc(inv.invoiceNumber)}</div>
            <div class="inv-client">${esc(c?.name||'?')}${proj?` · <span style="color:var(--text2)">${esc(proj.name)}</span>`:''}</div>
            <div class="col2 fs12" style="margin-top:2px">Generated ${fmtDate(inv.generatedAt.split('T')[0])} · ${inv.itemCount||0} item${(inv.itemCount||0)!==1?'s':''}</div>
          </div>
          <div class="exp-inv-card-right">
            <div class="inv-amt">${cur(inv.clientTotal)}</div>
            <div class="exp-inv-status-row">
              ${inv.paid
                ?`<span class="badge-paid">✓ Paid${inv.paidAt?` ${fmtDate(inv.paidAt.split('T')[0])}`:''}</span>`
                :`<span class="badge-unpaid">Unpaid</span>`}
              <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();${inv.paid?`markExpInvoicePaid('${inv.id}',false)`:`markExpInvoicePaid('${inv.id}',true)`}">${inv.paid?'↩ Unpaid':'💵 Mark Paid'}</button>
              <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();emailExpInvoice('${inv.id}')">✉ Email</button>
            </div>
            <div class="exp-inv-action-row">
              <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();previewInternalExpInv('${inv.id}')">👁 Preview Invoice</button>
              <button class="btn btn-dark btn-sm" onclick="event.stopPropagation();downloadClientExpPDF('${inv.id}')">⬇ Client Invoice</button>
            </div>
          </div>
        </div>
        <div id="expinvd-${inv.id}" class="exp-inv-detail-body" style="display:none">
          ${detailRows}
          <div class="inv-total-row"><span>Total</span><span class="gold-txt">${cur(inv.clientTotal)}</span></div>
        </div>
      </div>`;
    }).join('');
  };
  window.toggleExpInvDetail=(id,hd)=>{
    const el=document.getElementById(`expinvd-${id}`);
    const o=el.style.display!=='none';
    el.style.display=o?'none':'block';
    hd.classList.toggle('open',!o);
  };
  rebuildExpInvList();
}

          <select id="eg-cli" onchange="refreshExpGenProj();rebuildExpGenPreview()">${clients.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}</select></div>

  window._calStates = window._calStates || {time:{year:new Date().getFullYear(),month:new Date().getMonth()},exp:{year:new Date().getFullYear(),month:new Date().getMonth()}};
  window.refreshExpGenProj = () => {
    const cliId=document.getElementById('eg-cli').value;
    const sel=document.getElementById('eg-proj');
    sel.innerHTML=`<option value="">All Projects</option>`+getProjectsByClient(cliId).map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
  };

  window.rebuildExpGenPreview = () => {
    const cliId=document.getElementById('eg-cli').value;
    const projId=document.getElementById('eg-proj').value;
    let items=loadExpItems().filter(i=>i.clientId===cliId&&i.status==='filed');
    if(projId) items=items.filter(i=>i.projectId===projId);
    const el=document.getElementById('exp-gen-preview');
    if(!items.length){el.innerHTML=`<div class="inv-preview-wrap"><p class="col2" style="text-align:center;padding:8px">No filed (unbilled) items for this selection.</p></div>`;return;}
    let html=`<div style="font-size:12px;color:var(--text2);margin-bottom:8px">Select items to include:</div>`;
    let total=0;
    items.forEach(item=>{
      const c=calcItem(item); total+=c.clientTotal;
      html+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
        <input type="checkbox" id="chk-${item.id}" checked style="width:auto;cursor:pointer">
        <label for="chk-${item.id}" style="flex:1;cursor:pointer;font-size:13px">
          <strong>${esc(item.vendorName)}</strong> — ${esc(item.description)}<br>
          <span class="col2 fs12">${CAT_LABELS[item.category]} · ${fmtDate(item.date||'')}</span>
        </label>
        <span class="gold-txt fw7">${cur(c.clientTotal)}</span>
      </div>`;
    });
    html+=`<div class="inv-total-row" style="margin-top:8px"><span>Estimated Total</span><span id="eg-total" class="gold-txt">${cur(total)}</span></div>`;
    el.innerHTML=`<div class="inv-preview-wrap">${html}</div>`;
    items.forEach(item=>document.getElementById(`chk-${item.id}`)?.addEventListener('change',updateExpTotal));
  };

  window.updateExpTotal = () => {
    const cliId=document.getElementById('eg-cli').value;
    const projId=document.getElementById('eg-proj').value;
    let items=loadExpItems().filter(i=>i.clientId===cliId&&i.status==='filed');
    if(projId) items=items.filter(i=>i.projectId===projId);
    let total=0;
    items.forEach(i=>{const chk=document.getElementById(`chk-${i.id}`);if(chk?.checked)total+=calcItem(i).clientTotal;});
    const te=document.getElementById('eg-total'); if(te) te.textContent=cur(total);
  };

  rebuildExpGenPreview();
}

/* ══════════════════════════════════════════════════════

function generateExpPDF() {
  const cliId  = document.getElementById('eg-cli').value;
  const projId = document.getElementById('eg-proj').value;
  let items=loadExpItems().filter(i=>i.clientId===cliId&&i.status==='filed');
  if(projId) items=items.filter(i=>i.projectId===projId);
  const selected=items.filter(i=>document.getElementById(`chk-${i.id}`)?.checked);
  if(!selected.length){toast('No items selected');return;}

  const c=getClientById(cliId), proj=projId?getProjectById(projId):null;
  const s=loadSettings(), es=loadExpSettings();
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'letter'});
  const PW=215.9, M=20, R=PW-M;
  const invNum=`${es.invoicePrefix}-${String(es.invoiceNext).padStart(4,'0')}`;
  const issueDate=todayStr(), dueD=new Date(issueDate); dueD.setDate(dueD.getDate()+14);

  // Header
  doc.setFontSize(18);doc.setFont('helvetica','bold');doc.setTextColor(20,20,18);
  doc.text(s.firmName||'Your Firm',M,26);
  doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(100,100,95);
  let iy=32;
  if(s.firmAddress){doc.text(s.firmAddress,M,iy);iy+=5;}
  if(s.firmEmail){doc.text(s.firmEmail,M,iy);}
  doc.setFontSize(22);doc.setFont('helvetica','bold');doc.setTextColor(196,168,122);
  doc.text('INVOICE',R,26,{align:'right'});
  doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(100,100,95);
  doc.text(`Invoice #: ${invNum}`,R,33,{align:'right'});
  doc.text(`Date: ${fmtDateLong(issueDate)}`,R,38,{align:'right'});
  doc.text(`Due: ${fmtDateLong(dueD.toISOString().split('T')[0])}`,R,43,{align:'right'});
  doc.setDrawColor(220,215,205);doc.setLineWidth(0.4);doc.line(M,52,R,52);
  doc.setFontSize(7.5);doc.setFont('helvetica','bold');doc.setTextColor(130,125,118);doc.text('BILL TO',M,59);
  doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(20,20,18);doc.text(c.name,M,65);
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(90,85,80);
  let by=71;
  if(c.contactName){doc.text(c.contactName,M,by);by+=5;}
  if(c.email){doc.text(c.email,M,by);}
  if(proj){doc.setFontSize(8.5);doc.text(`Project: ${proj.name}`,R,65,{align:'right'});}

  // Table — client-facing only (no vendor prices shown)
  const body=selected.map(item=>{
    const ct=calcItem(item).clientTotal;
    return[item.date?fmtDate(item.date):'',CAT_LABELS[item.category]||item.category,item.description,cur(ct)];
  });
  doc.autoTable({startY:88,head:[['Date','Category','Description','Amount']],body,margin:{left:M,right:M},
    styles:{fontSize:8.5,cellPadding:3.5,textColor:[30,28,24]},
    headStyles:{fillColor:[30,28,24],textColor:[255,255,255],fontStyle:'bold',fontSize:8},
    columnStyles:{0:{cellWidth:24},1:{cellWidth:26},2:{cellWidth:'auto',overflow:'linebreak'},3:{cellWidth:28,halign:'right'}},
    alternateRowStyles:{fillColor:[249,248,245]}});

  const aft=doc.lastAutoTable.finalY+8;
  const total=selected.reduce((s,i)=>s+calcItem(i).clientTotal,0);
  doc.setFontSize(12);doc.setFont('helvetica','bold');doc.setTextColor(20,20,18);
  doc.text('Total Due:',R-40,aft+10);doc.setTextColor(168,140,94);doc.text(cur(total),R,aft+10,{align:'right'});
  doc.setFontSize(8);doc.setFont('helvetica','italic');doc.setTextColor(160,155,148);
  doc.setDrawColor(220,215,205);doc.line(M,256,R,256);
  doc.text('Thank you for your business. Payment due within 14 days.',PW/2,261,{align:'center'});
  doc.setFontSize(6.5);doc.setFont('helvetica','normal');doc.setTextColor(195,190,183);
  doc.text('Billed via jasejonesinvoicing.com',PW/2,268,{align:'center'});

  // Save invoice record
  const invRecord={id:uid(),invoiceNumber:invNum,clientId:cliId,projectId:projId||null,
    itemIds:selected.map(i=>i.id),clientTotal:total,itemCount:selected.length,
    items:selected.map(i=>({id:i.id,vendorName:i.vendorName,description:i.description,category:i.category,clientTotal:calcItem(i).clientTotal})),
    generatedAt:new Date().toISOString()};
  const il=loadExpInvoices(); il.push(invRecord); saveExpInvoices(il);
  es.invoiceNext+=1; saveExpSettings(es);

  // Mark items as billed
  selected.forEach(item=>updateExpItem(item.id,{status:'billed',billedInvoiceId:invRecord.id}));

  _pendingInvDoc=doc;
  _pendingInvFilename=`${invNum}-${c.name.replace(/\s+/g,'-')}-Expenses.pdf`;
  showModal(`
    <div class="modal-hd"><h2>Invoice Saved</h2><button class="modal-x" onclick="closeModal()">×</button></div>
    <div style="padding:20px 24px 8px">
      <p style="font-size:14px;margin-bottom:6px"><strong>${invNum}</strong> has been saved to Invoice History.</p>
      <p style="font-size:13px;color:var(--text2);margin-bottom:20px">Would you like to download a PDF of this invoice now?</p>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-ghost" onclick="closeModal();_pendingInvDoc=null;">No, maybe later</button>

      </div>
    </div>
  `);
}

/* ══════════════════════════════════════════════════════
   BILLING CALENDAR
══════════════════════════════════════════════════════ */
const CAL_MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const CAL_DAYS=['Su','Mo','Tu','We','Th','Fr','Sa'];

function buildBillingCalendarHTML(calKey, year, month, dateMap) {
  const today=todayStr();
  const first=new Date(year,month,1);
  const last=new Date(year,month+1,0);
  const wrapId=calKey==='time'?'billing-cal-wrap':'exp-billing-cal-wrap';
  const cliId=calKey==='time'?'cal-cli':'exp-cal-cli';

  let cells='';
  CAL_DAYS.forEach(d=>cells+=`<div class="cal-dow">${d}</div>`);

  // Leading blanks from previous month
  const startDow=first.getDay();
  for(let i=0;i<startDow;i++){
    const pd=new Date(year,month,i-startDow+1);
    cells+=`<div class="cal-day other-month"><span class="cal-day-num">${pd.getDate()}</span></div>`;
  }

  // Days of current month
  for(let d=1;d<=last.getDate();d++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=ds===today;
    const info=dateMap.get(ds);
    let cls='cal-day';
    if(isT) cls+=' today';
    let badges='';
    if(info){
      const hasU=info.unbilled>0, hasB=info.billed>0;
      if(hasU&&hasB) cls+=' has-both';
      else if(hasU)  cls+=' has-unbilled';
      else if(hasB)  cls+=' has-billed';
      if(hasU) badges+=`<span class="cal-badge unbilled">${info.unbilled} unbilled</span>`;
      if(hasB) badges+=`<span class="cal-badge billed">${info.billed} billed</span>`;
    }
    cells+=`<div class="${cls}"><span class="cal-day-num">${d}</span><div class="cal-badges">${badges}</div></div>`;
  }

  // Trailing blanks
  const endDow=last.getDay();
  for(let i=endDow+1;i<7;i++) cells+=`<div class="cal-day other-month"><span class="cal-day-num">${i-endDow}</span></div>`;

  return `<div class="billing-cal">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="shiftBillingCal('${calKey}',-1)">&#8249;</button>
      <span class="cal-nav-title">${CAL_MONTHS[month]} ${year}</span>
      <button class="cal-nav-btn" onclick="shiftBillingCal('${calKey}',1)">&#8250;</button>
    </div>
    <div class="cal-grid">${cells}</div>
    <div class="cal-legend">
      <div class="cal-legend-item"><span class="cal-legend-swatch unbilled"></span> Needs billing</div>
      <div class="cal-legend-item"><span class="cal-legend-swatch billed"></span> Already invoiced</div>
    </div>
  </div>`;
}

window.refreshBillingCal = calKey => {
  const cliId=document.getElementById(calKey==='time'?'cal-cli':'exp-cal-cli').value;
  const wrapId=calKey==='time'?'billing-cal-wrap':'exp-billing-cal-wrap';
  const wrap=document.getElementById(wrapId);
  if(!wrap) return;
  if(!cliId){wrap.innerHTML=`<div class="cal-empty-msg"><div class="cal-ei">📅</div>Select a client to view their billing calendar</div>`;return;}

  // Build dateMap
  const dateMap=new Map();
  if(calKey==='time'){
    loadEntries().filter(e=>e.clientId===cliId).forEach(e=>{
      if(!dateMap.has(e.date)) dateMap.set(e.date,{unbilled:0,billed:0});
      const m=dateMap.get(e.date);
      isInvoiced(e)?m.billed++:m.unbilled++;
    });
  } else {
    loadExpItems().filter(i=>i.clientId===cliId&&i.date).forEach(i=>{
      if(!dateMap.has(i.date)) dateMap.set(i.date,{unbilled:0,billed:0});
      const m=dateMap.get(i.date);
      i.status==='billed'?m.billed++:m.unbilled++;
    });
  }

  if(!window._calStates) window._calStates={time:{year:new Date().getFullYear(),month:new Date().getMonth()},exp:{year:new Date().getFullYear(),month:new Date().getMonth()}};
  window._calStates[`${calKey}_dateMap`]=dateMap;
  const {year,month}=window._calStates[calKey];
  wrap.innerHTML=buildBillingCalendarHTML(calKey,year,month,dateMap);
};

window.shiftBillingCal = (calKey,dir) => {
  if(!window._calStates) return;
  const st=window._calStates[calKey];
  st.month+=dir;
  if(st.month>11){st.month=0;st.year++;}
  if(st.month<0){st.month=11;st.year--;}
  const dateMap=window._calStates[`${calKey}_dateMap`];
  if(!dateMap) return;
  const wrapId=calKey==='time'?'billing-cal-wrap':'exp-billing-cal-wrap';
  const wrap=document.getElementById(wrapId);
  if(wrap) wrap.innerHTML=buildBillingCalendarHTML(calKey,st.year,st.month,dateMap);
};

   ROUTER
══════════════════════════════════════════════════════ */
const ROUTES={'#dashboard':renderDashboard,'#designers':renderDesigners,'#hours':renderHours,'#projects':renderProjects,'#clients':renderClients,'#invoices':renderInvoices,'#generate':renderGenerate,'#analytics':renderAnalytics,'#settings':renderSettings,'#exp-items':renderExpItems,'#exp-generate':renderExpGenerate,'#exp-invoices':renderExpInvoices,'#exp-settings':renderExpSettings,'#exp-analytics':renderExpAnalytics};
function navigate(hash){window.location.hash=hash;closeMobileMenu();}
function labelTableCells() {
  if(window.innerWidth > 800) return;
  document.querySelectorAll('table').forEach(tbl => {
    const headers = [...tbl.querySelectorAll('thead th')].map(th => th.textContent.trim());
    tbl.querySelectorAll('tbody tr:not(.tbl-footer)').forEach(row => {
      [...row.querySelectorAll('td')].forEach((td, i) => {
        td.setAttribute('data-label', headers[i] || '');
      });
    });
  });
}

function render(){
  destroyCharts();
  const hash=window.location.hash||'#dashboard';
  highlightNav();
  (ROUTES[hash]||renderDashboard)();
  setTimeout(labelTableCells, 0);
}
window.addEventListener('hashchange',render);

/* ══════════════════════════════════════════════════════
   TIMER
══════════════════════════════════════════════════════ */
const loadTimer     = () => load('tt_timer', null);
const saveTimerData = t => {
  store('tt_timer', t);
  if(_sb && _currentUser)(async()=>{ try{ await _sb.from('user_timers').upsert({user_id:_currentUser.id,timer_data:t,updated_at:new Date().toISOString()}); }catch(e){} })();
};
const clearTimerData = () => {
  localStorage.removeItem('tt_timer');
  delete _cache['tt_timer'];
  if(_sb && _currentUser)(async()=>{ try{ await _sb.from('user_timers').delete().eq('user_id',_currentUser.id); }catch(e){} })();
};
let _timerInterval = null;

function fmtElapsed(ms) {
  const s=Math.floor(ms/1000), h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}
function msToHours(ms) { return Math.max(0.25, Math.round((ms/3600000)*4)/4); }

function updateFAB(running) {
  const fab=document.getElementById('mobile-timer-fab');
  const pill=document.getElementById('fab-elapsed-pill');
  if(!fab) return;
  if(running) { fab.classList.add('running'); fab.textContent='■'; if(pill) pill.classList.add('show'); }
  else { fab.classList.remove('running'); fab.textContent='⏱'; if(pill){pill.classList.remove('show');pill.textContent='';} }
}

function mobileFabClick() {
  const t=loadTimer();
  if(t&&t.running) stopTimer(); else openTimerModal();
}

function startTimerDisplay() {
  if(_timerInterval) clearInterval(_timerInterval);
  const t=loadTimer();
  if(!t||!t.running) return;
  document.getElementById('sb-normal').style.display='none';
  document.getElementById('sb-timer').style.display='block';
  const c=getClientById(t.clientId), p=t.projectId?getProjectById(t.projectId):null;
  document.getElementById('sb-timer-info').textContent=[c?.name, p?.name||t.projectText].filter(Boolean).join(' · ')||'Timer running…';
  updateFAB(true);
  _timerInterval=setInterval(()=>{
    const elapsed=Date.now()-new Date(t.startedAt).getTime();
    const el=document.getElementById('sb-elapsed');
    if(el) el.textContent=fmtElapsed(elapsed);
    const pill=document.getElementById('fab-elapsed-pill');
    if(pill&&pill.classList.contains('show')) pill.textContent=fmtElapsed(elapsed);
  },1000);
  // set initial immediately
  const elapsed=Date.now()-new Date(t.startedAt).getTime();
  const el=document.getElementById('sb-elapsed');
  if(el) el.textContent=fmtElapsed(elapsed);
  const pill=document.getElementById('fab-elapsed-pill');
  if(pill&&pill.classList.contains('show')) pill.textContent=fmtElapsed(elapsed);
}

function stopTimerDisplay() {
  if(_timerInterval){clearInterval(_timerInterval);_timerInterval=null;}
  const n=document.getElementById('sb-normal'), s=document.getElementById('sb-timer');
  if(n) n.style.display='';
  if(s) s.style.display='none';
  updateFAB(false);
}

function openTimerModal() {
  const t=loadTimer();
  if(t&&t.running){toast('A timer is already running — stop it first');return;}
  const clients=loadClients(), designers=loadDesigners();
  if(!clients.length){toast('Please add a client first');navigate('#clients');return;}
  const cliId=clients[0]?.id||'';
  const projs=getProjectsByClient(cliId);
  const desSel=designers.map(d=>`<option value="${d.id}" ${d.id===_myDesignerId?'selected':''}>${esc(d.name)}</option>`).join('');
  const projContent=projs.length
    ?`<select id="t-proj">${projectOptsForClient(cliId,'')}</select>`
    :`<input type="text" id="t-proj-text" placeholder="e.g. Brand Identity">`;

  showModal(`
    <div class="modal-hd"><h2>Start Timer</h2><button class="modal-x" onclick="closeModal()">×</button></div>
    <div class="form-group">
      <label class="field-label">Client</label>
      <select id="t-cli" onchange="refreshTimerProj(this.value)">${clients.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}</select>
    </div>
    ${designers.length?`<div class="form-group"><label class="field-label">Designer</label><select id="t-des"><option value="">— unassigned —</option>${desSel}</select></div>`:''}
    <div class="form-group">
      <label class="field-label">Project</label>
      <div id="t-proj-wrap">${projContent}</div>
    </div>
    <div class="form-group">
      <label class="field-label">What are you working on?</label>
      <textarea id="t-desc" placeholder="Describe the work you're about to start…" style="min-height:64px"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-gold" onclick="startTimer()" style="gap:8px;font-size:14px;padding:9px 20px">▶ &nbsp;Start Timer</button>
    </div>`);
}

window.refreshTimerProj = cliId => {
  const projs=getProjectsByClient(cliId);
  document.getElementById('t-proj-wrap').innerHTML=projs.length
    ?`<select id="t-proj">${projectOptsForClient(cliId,'')}</select>`
    :`<input type="text" id="t-proj-text" placeholder="e.g. Brand Identity">`;
};

function startTimer() {
  const clientId=document.getElementById('t-cli').value;
  const desEl=document.getElementById('t-des');
  const designerId=desEl?desEl.value:'';
  const projSel=document.getElementById('t-proj'), projTxt=document.getElementById('t-proj-text');
  const projectId=projSel?projSel.value:'', projectText=projTxt?projTxt.value.trim():'';
  const description=document.getElementById('t-desc').value.trim();
  if(!clientId||(!projectId&&!projectText)){toast('Please select a client and project');return;}
  saveTimerData({running:true,startedAt:new Date().toISOString(),clientId,designerId,projectId,projectText,description});
  closeModal();
  startTimerDisplay();
  toast('Timer started');
}

function stopTimer() {
  const t=loadTimer();
  if(!t||!t.running) return;
  const elapsed=Date.now()-new Date(t.startedAt).getTime();
  const hours=msToHours(elapsed);
  const elapsedStr=fmtElapsed(elapsed);
  stopTimerDisplay();
  clearTimerData();
  showTimerReview(t, hours, elapsedStr);
}

function showTimerReview(t, hours, elapsedStr) {
  const clients=loadClients(), designers=loadDesigners();
  const cliId=t.clientId;
  const projs=getProjectsByClient(cliId);
  const clientSel=clients.map(c=>`<option value="${c.id}" ${c.id===cliId?'selected':''}>${esc(c.name)}</option>`).join('');
  const desSel=designers.map(d=>`<option value="${d.id}" ${d.id===t.designerId?'selected':''}>${esc(d.name)}</option>`).join('');
  const designerRow=designers.length?`<div class="form-group"><label class="field-label">Designer</label><select id="tr-des"><option value="">— unassigned —</option>${desSel}</select></div>`:'';
  const projContent=projs.length
    ?`<select id="tr-proj">${projectOptsForClient(cliId,t.projectId)}</select>`
    :`<input type="text" id="tr-proj-text" value="${esc(t.projectText||'')}" placeholder="Project name">`;

  showModal(`
    <div class="modal-hd">
      <h2>Is this correct?</h2>
      <button class="modal-x" onclick="discardTimerEntry()">×</button>
    </div>
    <div class="timer-banner">
      <div class="tb-time">${elapsedStr}</div>
      <div class="tb-arrow">→</div>
      <div>
        <div class="tb-billed">${hours}h billed</div>
        <div style="font-size:11px;color:var(--text2)">Adjust hours below if needed</div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="field-label">Date</label>
        <input type="date" id="tr-date" value="${todayStr()}">
      </div>
      <div class="form-group">
        <label class="field-label">Hours</label>
        <input type="number" id="tr-hrs" step="0.25" min="0.25" value="${hours}">
      </div>
    </div>
    <div class="form-group">
      <label class="field-label">Client</label>
      <select id="tr-cli" onchange="refreshTimerReviewProj(this.value)">${clientSel}</select>
    </div>
    ${designerRow}
    <div class="form-group">
      <label class="field-label">Project</label>
      <div id="tr-proj-wrap">${projContent}</div>
    </div>
    <div class="form-group">
      <label class="field-label">Description</label>
      <textarea id="tr-desc">${esc(t.description)}</textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-danger" onclick="discardTimerEntry()">Discard</button>
      <button class="btn btn-gold" onclick="saveTimerEntry()">Save Entry</button>
    </div>`);
}

window.refreshTimerReviewProj = cliId => {
  const projs=getProjectsByClient(cliId);
  document.getElementById('tr-proj-wrap').innerHTML=projs.length
    ?`<select id="tr-proj">${projectOptsForClient(cliId,'')}</select>`
    :`<input type="text" id="tr-proj-text" placeholder="Project name">`;
};

function saveTimerEntry() {
  const date=document.getElementById('tr-date').value;
  const hours=parseFloat(document.getElementById('tr-hrs').value);
  const clientId=document.getElementById('tr-cli').value;
  const desEl=document.getElementById('tr-des');
  const designerId=desEl?desEl.value:'';
  const projSel=document.getElementById('tr-proj'), projTxt=document.getElementById('tr-proj-text');
  const projectId=projSel?projSel.value:'', projectText=projTxt?projTxt.value.trim():'';
  const description=document.getElementById('tr-desc').value.trim();
  if(!date||!clientId||isNaN(hours)||hours<=0||!description){toast('Please fill in all fields');return;}
  addEntry({date,hours,clientId,designerId,projectId,projectText,description});
  toast('Entry saved ✓');
  closeModal();
  render();
}

function discardTimerEntry() {
  if(confirm('Discard this time entry?')) closeModal();
}

/* ══════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════ */
updateSidebarFirm();

async function initSupabaseData() {
  if(!_sb || !_firmId) return;
  // Clear local cache so old browser data doesn't bleed into a fresh firm
  SYNC_KEYS.forEach(k => { delete _cache[k]; localStorage.removeItem(k); });
  try {
    const {data,error} = await _sb.from('app_data').select('*').eq('firm_id', _firmId);
    if(error){console.error('Supabase load error:',error);return;}
    data.forEach(row=>{
      _cache[row.key] = row.value;
      localStorage.setItem(row.key, JSON.stringify(row.value));
    });
  } catch(e){ console.error('Supabase init error:',e); }
}

function initRealtime() {
  if(!_sb || !_firmId) return;
  _sb.channel(`firm_${_firmId}_sync`)
    .on('postgres_changes',{event:'*',schema:'public',table:'app_data',filter:`firm_id=eq.${_firmId}`}, payload=>{
      if(!payload.new) return;
      const {key,value} = payload.new;
      if(!SYNC_KEYS.has(key)) return;
      _cache[key] = value;
      localStorage.setItem(key, JSON.stringify(value));
      render();
      toast('↻ Synced');
    })
    .subscribe();
}

// App boot — called once after successful auth
// One-time migration: stamp entryIds onto invoices that predate the per-entry tracking fix
function migrateInvoiceEntryIds() {
  const invoices = loadInvoices();
  const needsMigration = invoices.some(inv => !inv.entryIds);
  if (!needsMigration) return;
  const entries = loadEntries();
  const updated = invoices.map(inv => {
    if (inv.entryIds) return inv;
    const matched = entries.filter(e =>
      e.clientId === inv.clientId &&
      e.date >= inv.startDate &&
      e.date <= inv.endDate &&
      (!inv.designerId || inv.designerId === e.designerId)
    );
    return {...inv, entryIds: matched.map(e => e.id)};
  });
  saveInvoices(updated);
}

async function runApp() {
  await initSupabaseData();
  migrateInvoiceEntryIds();
  initRealtime();
  const cta=document.getElementById('sidebar-cta');
  cta.style.display = currentApp==='time' ? '' : 'none';
  document.querySelectorAll('.app-pill').forEach(b=>b.classList.remove('active'));
  const pill=document.getElementById(`pill-${currentApp}`);
  if(pill) pill.classList.add('active');
  renderSidebarNav();
  const hash=window.location.hash||'#dashboard';
  const timeRoutes=['#dashboard','#designers','#hours','#projects','#clients','#settings'];
  const expRoutes=['#exp-items','#exp-settings','#projects','#clients'];
  const invRoutes=['#invoices','#generate','#exp-invoices','#exp-generate'];
  const anaRoutes=['#analytics','#exp-analytics','#projects','#clients'];
  if(currentApp==='time'&&!timeRoutes.includes(hash)) window.location.hash='#dashboard';
  else if(currentApp==='expenses'&&!expRoutes.includes(hash)) window.location.hash='#exp-items';
  else if(currentApp==='invoicing'&&!invRoutes.includes(hash)) window.location.hash='#invoices';
  else if(currentApp==='analytics'&&!anaRoutes.includes(hash)) window.location.hash='#analytics';
  else if(!window.location.hash) window.location.hash=APP_DEFAULT[currentApp];
  render();
  if(loadTimer()?.running) startTimerDisplay();
  setTimeout(promptLinkDesigner, 1500);
}

// Auth state listener — handles sign-in, sign-out, and session restore
_sb.auth.onAuthStateChange(async (event, session) => {
  if(session?.user) {
    _currentUser = session.user;
    updateSidebarUser(_currentUser);
    hideAuthScreen();
    if(!_appInitialized) {
      _appInitialized = true;
      await loadMyProfile();
      const hasFirm = await loadFirmContext();
      if(!hasFirm) {
        showFirmScreen();
        return;
      }
      updateSidebarFirm();
      await syncTimerFromCloud();
      await runApp();
    }
  } else if(event === 'SIGNED_OUT') {
    _currentUser = null; _myDesignerId = null; _firmId = null;
    _firmName = null; _myRole = null; _firmInviteCode = null;
    _appInitialized = false;
    stopTimerDisplay();
    showAuthScreen();
  }
});

// Dark mode runs before auth so the login screen respects the setting
initDarkMode();

// Check for an existing session immediately on page load
(async () => {
  const { data: { session } } = await _sb.auth.getSession();
  if(!session) showAuthScreen();
  // If session exists, onAuthStateChange fires with INITIAL_SESSION and handles boot
})();
</script>
