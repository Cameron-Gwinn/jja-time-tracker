<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JJ&A Time Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:           #F9F8F5;
      --bg2:          #F2F0EB;
      --sidebar:      #141412;
      --sidebar-text: #E8E3D8;
      --sidebar-muted:#857F74;
      --accent:       #C4A87A;
      --accent-dk:    #A88C5E;
      --accent-lt:    #F5ECD8;
      --text:         #1A1916;
      --text2:        #6B6660;
      --border:       #E5E0D6;
      --card:         #FFFFFF;
      --invoiced:     #3D6B4F;
      --invoiced-bg:  #EAF2EC;
      --unbilled:     #A88C5E;
      --unbilled-bg:  #FBF5E8;
      --danger:       #8B3A3A;
      --danger-bg:    #F8ECEC;
      --shadow:       0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
      --shadow-lg:    0 4px 24px rgba(0,0,0,0.10);
      --sidebar-w:    230px;
      --radius:       8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }
    h1, h2, h3 { font-family: Georgia, 'Times New Roman', serif; font-weight: normal; letter-spacing: -0.02em; }

    /* Sidebar */
    #sidebar {
      width: var(--sidebar-w);
      background: var(--sidebar);
      color: var(--sidebar-text);
      display: flex;
      flex-direction: column;
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 200;
    }
    #sidebar-brand { padding: 26px 20px 18px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    #sidebar-brand .firm { font-family: Georgia, serif; font-size: 16px; color: #fff; line-height: 1.2; }
    #sidebar-brand .sub  { font-size: 10px; color: var(--sidebar-muted); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 4px; }
    #sidebar-cta { padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    #sb-normal { display: flex; flex-direction: column; gap: 7px; }
    #sb-normal .btn-logtime {
      width: 100%; background: var(--accent); color: var(--sidebar);
      border: none; padding: 9px 14px; border-radius: var(--radius);
      font-size: 12.5px; font-weight: 600; letter-spacing: 0.3px; cursor: pointer; transition: background .15s;
    }
    #sb-normal .btn-logtime:hover { background: var(--accent-dk); }
    #sb-normal .btn-starttimer {
      width: 100%; background: transparent; color: var(--sidebar-muted);
      border: 1px solid rgba(255,255,255,0.1); padding: 7px 14px; border-radius: var(--radius);
      font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    #sb-normal .btn-starttimer:hover { color: var(--sidebar-text); border-color: rgba(255,255,255,0.25); }

    /* Running timer state */
    #sb-timer { display: none; }
    .timer-live {
      background: rgba(224,92,92,0.12); border: 1px solid rgba(224,92,92,0.25);
      border-radius: var(--radius); padding: 12px 14px;
    }
    .timer-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .timer-dot {
      width: 8px; height: 8px; background: #E05C5C; border-radius: 50%; flex-shrink: 0;
      animation: timerPulse 1.2s ease-in-out infinite;
    }
    @keyframes timerPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.85)} }
    #sb-elapsed {
      font-family: 'SF Mono', 'Fira Code', Menlo, monospace;
      font-size: 20px; color: #fff; letter-spacing: 2px; line-height: 1;
    }
    #sb-timer-info { font-size: 11px; color: var(--sidebar-muted); margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn-stoptimer {
      width: 100%; background: #E05C5C; color: #fff;
      border: none; padding: 8px 14px; border-radius: var(--radius);
      font-size: 12.5px; font-weight: 600; cursor: pointer; transition: background .15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-stoptimer:hover { background: #C44A4A; }

    /* Timer review modal banner */
    .timer-banner {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 16px; margin-bottom: 18px;
      display: flex; align-items: center; gap: 12px;
    }
    .timer-banner .tb-time { font-family: 'SF Mono', Menlo, monospace; font-size: 18px; color: var(--text); font-weight: 700; }
    .timer-banner .tb-arrow { color: var(--text2); font-size: 16px; }
    .timer-banner .tb-billed { font-family: Georgia, serif; font-size: 16px; color: var(--accent-dk); }
    #sidebar-nav { flex: 1; padding: 8px 0; overflow-y: auto; }
    #sidebar-nav .nav-section {
      padding: 14px 20px 5px; font-size: 9.5px; color: var(--sidebar-muted);
      text-transform: uppercase; letter-spacing: 1.5px;
    }
    #sidebar-nav a {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 20px; color: var(--sidebar-muted); text-decoration: none;
      font-size: 13px; transition: color .15s, background .15s;
      border-right: 2px solid transparent;
    }
    #sidebar-nav a .icon { font-size: 14px; width: 18px; text-align: center; }
    #sidebar-nav a:hover  { color: var(--sidebar-text); background: rgba(255,255,255,0.04); }
    #sidebar-nav a.active { color: #fff; background: rgba(196,168,122,0.12); border-right-color: var(--accent); }

    /* Main */
    #main { margin-left: var(--sidebar-w); flex: 1; padding: 34px 38px; min-height: 100vh; }

    .page-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 26px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
    .page-head h1 { font-size: 26px; }
    .page-head .sub { font-size: 13px; color: var(--text2); margin-top: 3px; }

    /* Cards */
    .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 22px; margin-bottom: 16px; }
    .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .card-head h2 { font-size: 16px; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 22px; }
    .stat { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px 20px; }
    .stat .val { font-family: Georgia, serif; font-size: 28px; color: var(--text); line-height: 1; margin-bottom: 4px; }
    .stat .lbl { font-size: 10.5px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; }
    .stat .val.gold { color: var(--accent-dk); }

    /* Table */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      text-align: left; padding: 8px 13px;
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--text2); font-weight: 600; font-family: -apple-system, sans-serif;
      border-bottom: 1px solid var(--border); background: var(--bg);
    }
    tbody td { padding: 10px 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #FDFCF9; }
    .tbl-footer td { background: var(--bg2) !important; font-weight: 600; font-size: 13px; border-top: 1px solid var(--border) !important; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 14px; border-radius: var(--radius); border: none;
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: opacity .15s, background .15s; white-space: nowrap;
    }
    .btn:hover { opacity: .85; }
    .btn-gold    { background: var(--accent); color: var(--sidebar); }
    .btn-dark    { background: var(--text); color: #fff; }
    .btn-ghost   { background: transparent; border: 1px solid var(--border); color: var(--text2); }
    .btn-ghost:hover { color: var(--text); border-color: var(--text2); opacity: 1; }
    .btn-danger  { background: var(--danger-bg); color: var(--danger); border: 1px solid #E8C8C8; }
    .btn-sm      { padding: 4px 10px; font-size: 12px; }

    /* Forms */
    .form-group { margin-bottom: 15px; }
    .form-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    label.field-label {
      display: block; font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.7px; color: var(--text2); margin-bottom: 5px;
    }
    input, select, textarea {
      width: 100%; padding: 9px 12px; border: 1px solid var(--border);
      border-radius: var(--radius); font-size: 14px; background: #fff;
      color: var(--text); transition: border-color .15s, box-shadow .15s; font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-lt);
    }
    textarea { resize: vertical; min-height: 76px; }
    .form-actions { display: flex; gap: 10px; justify-content: flex-end; padding-top: 4px; }

    /* Modal */
    .overlay {
      position: fixed; inset: 0; background: rgba(20,20,18,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 500; backdrop-filter: blur(2px);
    }
    .modal {
      background: var(--card); border-radius: 12px; padding: 26px;
      width: 500px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
      box-shadow: var(--shadow-lg);
    }
    .modal-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-hd h2 { font-size: 20px; }
    .modal-x { background: none; border: none; font-size: 22px; color: var(--text2); cursor: pointer; line-height: 1; padding: 2px 5px; border-radius: 4px; }
    .modal-x:hover { background: var(--bg); color: var(--text); }

    /* Badges */
    .badge {
      display: inline-flex; align-items: center; padding: 2px 9px;
      border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
    }
    .badge-invoiced { background: var(--invoiced-bg); color: var(--invoiced); }
    .badge-unbilled { background: var(--unbilled-bg); color: var(--unbilled); }
    .badge-gold     { background: var(--accent-lt); color: var(--accent-dk); }
    .badge-dark     { background: var(--bg2); color: var(--text2); }
    .badge-blue     { background: #EBF3FB; color: #2E6DA8; }

    /* Filters */
    .filters {
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
      margin-bottom: 18px; padding: 12px 16px;
      background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
    }
    .filters select, .filters input[type="text"] { width: auto; font-size: 13px; padding: 6px 9px; }
    .filters input[type="text"] { flex: 1; min-width: 140px; max-width: 220px; }
    .filters label.field-label { margin: 0; white-space: nowrap; }
    .filters .sep { width: 1px; height: 20px; background: var(--border); }

    /* Client group */
    .cgroup { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 14px; overflow: hidden; }
    .cgroup-hd { display: flex; justify-content: space-between; align-items: center; padding: 13px 18px; cursor: pointer; user-select: none; border-bottom: 1px solid var(--border); }
    .cgroup-hd:hover { background: #FDFCFA; }
    .cgroup-hd .name  { font-family: Georgia, serif; font-size: 15px; }
    .cgroup-hd .meta  { display: flex; gap: 18px; align-items: center; font-size: 13px; color: var(--text2); }
    .cgroup-hd .meta strong { color: var(--accent-dk); }
    .cgroup-hd .chevron { font-size: 11px; color: var(--text2); margin-left: 10px; transition: transform .2s; }
    .cgroup-hd.collapsed .chevron { transform: rotate(-90deg); }

    /* Designer card */
    .designer-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 14px; overflow: hidden; }
    .designer-card-hd { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; }
    .designer-card-hd .dname { font-family: Georgia, serif; font-size: 17px; }
    .designer-card-hd .dmeta { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .designer-card-hd .dright { display: flex; gap: 10px; align-items: center; }
    .designer-card-hd .dstats { text-align: right; margin-right: 10px; }
    .designer-card-hd .dstats .big { font-family: Georgia, serif; font-size: 19px; color: var(--accent-dk); }
    .designer-card-hd .dstats .sm  { font-size: 10.5px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
    .designer-hours { border-top: 1px solid var(--border); }

    /* Project card */
    .proj-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 10px; }
    .proj-card-hd { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; }
    .proj-card .proj-name { font-family: Georgia, serif; font-size: 15px; }
    .proj-card .proj-client { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .proj-card .proj-stats { display: flex; gap: 14px; align-items: center; font-size: 13px; color: var(--text2); }
    .proj-card .proj-stats strong { color: var(--accent-dk); }

    /* Invoice card */
    .inv-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 14px; overflow: hidden; }
    .inv-card-hd { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; cursor: pointer; border-bottom: 1px solid transparent; }
    .inv-card-hd.open { border-bottom-color: var(--border); }
    .inv-card-hd:hover { background: #FDFCFA; }
    .inv-card-hd .inv-num { font-family: Georgia, serif; font-size: 16px; }
    .inv-card-hd .inv-client { font-size: 12.5px; color: var(--text2); margin-top: 2px; }
    .inv-card-hd .inv-right  { text-align: right; }
    .inv-card-hd .inv-amt   { font-family: Georgia, serif; font-size: 18px; color: var(--accent-dk); }
    .inv-card-hd .inv-meta  { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .inv-detail { padding: 0; }

    /* Analytics */
    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .chart-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; }
    .chart-card h3 { font-size: 13px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 16px; font-family: -apple-system, sans-serif; font-weight: 600; }
    .chart-card canvas { max-height: 240px; }
    .chart-full { grid-column: 1 / -1; }
    .chart-card canvas.tall { max-height: 320px; }

    .insight-cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 18px; }
    .insight { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px 18px; border-left: 3px solid var(--accent); }
    .insight .i-val { font-family: Georgia, serif; font-size: 20px; color: var(--accent-dk); margin-bottom: 3px; }
    .insight .i-lbl { font-size: 12px; color: var(--text2); }

    .kw-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .kw-table th { text-align: left; padding: 7px 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text2); font-weight: 600; border-bottom: 1px solid var(--border); }
    .kw-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
    .kw-table tr:last-child td { border: none; }
    .kw-bar { height: 5px; background: var(--accent); border-radius: 3px; margin-top: 3px; transition: width .3s; }

    /* Empty state */
    .empty { text-align: center; padding: 56px 24px; color: var(--text2); }
    .empty .e-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
    .empty p { margin-bottom: 16px; font-size: 14px; }

    /* Inv preview */
    .inv-preview-wrap { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 16px; }
    .inv-preview-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; gap: 12px; }
    .inv-preview-row:last-child { border: none; }
    .inv-preview-row .desc { color: var(--text2); font-size: 12px; }
    .inv-total-row { display: flex; justify-content: space-between; padding: 10px 0 3px; font-family: Georgia, serif; font-size: 16px; }

    /* Toast */
    #toast { position: fixed; bottom: 26px; right: 26px; background: var(--text); color: #fff; padding: 11px 18px; border-radius: var(--radius); font-size: 13px; z-index: 1000; opacity: 0; transform: translateY(8px); transition: opacity .2s, transform .2s; pointer-events: none; max-width: 300px; }
    #toast.show { opacity: 1; transform: translateY(0); }

    .danger-zone { border: 1px solid #EBCFCF; border-radius: var(--radius); padding: 16px 20px; background: #FDF6F6; }
    .danger-zone h3 { font-family: inherit; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--danger); margin-bottom: 10px; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .flex-gap { display: flex; gap: 10px; flex-wrap: wrap; }
    .ml-auto { margin-left: auto; }
    .fw7 { font-weight: 700; }
    .fs12 { font-size: 12px; }
    .col2 { color: var(--text2); }
    .gold-txt { color: var(--accent-dk); font-family: Georgia, serif; }
    .radio-group { display: flex; gap: 14px; flex-wrap: wrap; }
    .radio-opt { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px; }
    .radio-opt input { width: auto; }
    .hint { font-size: 11.5px; color: var(--text2); margin-top: 5px; }
    .proj-group { margin-bottom: 22px; }
    .proj-group-label { font-family: Georgia, serif; font-size: 14px; color: var(--text2); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

    /* Project status toggle */
    .proj-toggle-wrap { display: flex; align-items: center; gap: 8px; }
    .proj-toggle-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2); white-space: nowrap; transition: color .2s; }
    .proj-toggle-label.active-lbl  { color: var(--invoiced); }
    .proj-toggle-label.done-lbl    { color: var(--accent-dk); }
    .toggle-switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; cursor: pointer; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute; inset: 0; border-radius: 22px;
      background: var(--invoiced-bg); border: 1.5px solid var(--invoiced);
      transition: background .25s, border-color .25s;
    }
    .toggle-thumb {
      position: absolute; top: 3px; left: 3px;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--invoiced); transition: transform .25s, background .25s;
    }
    .toggle-switch input:checked ~ .toggle-track { background: var(--accent-lt); border-color: var(--accent); }
    .toggle-switch input:checked ~ .toggle-thumb { transform: translateX(18px); background: var(--accent-dk); }

    /* Completed project card */
    .proj-card.completed { opacity: 0.72; }
    .proj-card.completed .proj-name { text-decoration: line-through; color: var(--text2); }

    /* Completed section header */
    .completed-section-hd {
      display: flex; align-items: center; gap: 10px; margin: 28px 0 12px;
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text2);
    }
    .completed-section-hd::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* App Switcher */
    #app-switcher { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; gap: 4px; }
    .app-pill {
      flex: 1; padding: 6px 2px; background: transparent; color: var(--sidebar-muted);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
      font-size: 10.5px; font-weight: 600; cursor: pointer; transition: all .2s;
      letter-spacing: 0.2px;
    }
    .app-pill:hover { color: var(--sidebar-text); border-color: rgba(255,255,255,0.28); }
    .app-pill.active { background: var(--accent); color: var(--sidebar); border-color: var(--accent); }

    /* Expense styles */
    .exp-category { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; background: #EBF3FB; color: #2E6DA8; }
    .exp-item-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 10px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; }
    .exp-item-card.billed { opacity: 0.65; }
    .exp-item-left { flex: 1; min-width: 0; }
    .exp-item-vendor { font-family: Georgia, serif; font-size: 15px; margin-bottom: 2px; }
    .exp-item-desc { font-size: 12.5px; color: var(--text2); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .exp-item-right { text-align: right; flex-shrink: 0; }
    .exp-client-total { font-family: Georgia, serif; font-size: 19px; color: var(--accent-dk); }
    .exp-vendor-price { font-size: 11.5px; color: var(--text2); margin-top: 2px; }
    .exp-markup-info { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .exp-folder-group { margin-bottom: 22px; }
    .exp-folder-hd { font-family: Georgia, serif; font-size: 14px; color: var(--text2); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .badge-filed   { background: #EBF3FB; color: #2E6DA8; }
    .badge-billed  { background: var(--invoiced-bg); color: var(--invoiced); }
    .badge-category-furniture   { background: #FBF0E8; color: #8B5E3C; }
    .badge-category-fabric      { background: #EDF8F0; color: #2D6A4F; }
    .badge-category-contractor  { background: #F0EBF8; color: #6A3C8B; }
    .badge-category-upholstery  { background: #FBF5E8; color: #8B7A3C; }
    .badge-category-storage     { background: #EBF3FB; color: #2E6DA8; }
    .badge-category-shipping    { background: #FBEBE8; color: #8B3C3C; }
    .badge-category-other       { background: var(--bg2); color: var(--text2); }
    .price-preview { background: var(--bg2); border-radius: var(--radius); padding: 12px 16px; margin-top: 12px; font-size: 13px; }
    .price-preview .pp-row { display: flex; justify-content: space-between; padding: 3px 0; }
    .price-preview .pp-total { display: flex; justify-content: space-between; padding-top: 8px; margin-top: 4px; border-top: 1px solid var(--border); font-family: Georgia, serif; font-size: 16px; }
    .exp-inv-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 14px; overflow: hidden; }
    .exp-inv-card-hd { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; cursor: pointer; border-bottom: 1px solid transparent; }
    .exp-inv-card-hd.open { border-bottom-color: var(--border); }
    .exp-inv-card-hd:hover { background: #FDFCFA; }

    /* ── Dark mode ──────────────────────────────────── */
    body.dark-mode {
      --bg: #1C1A17; --bg2: #242118; --card: #272420; --text: #EDE9E2; --text2: #9B9690;
      --border: #38352E; --shadow: 0 1px 5px rgba(0,0,0,0.4); --accent: #C4A87A; --accent-dk: #D4B88A;
      --invoiced: #5DA87A; --unbilled: #C4705A; --danger: #C05A5A;
    }
    body.dark-mode #sidebar { background: #0F0D0B; }
    body.dark-mode .inv-card-hd:hover, body.dark-mode .exp-inv-card-hd:hover { background: #2F2C27; }
    body.dark-mode input, body.dark-mode select, body.dark-mode textarea { background: #2A2720; border-color: var(--border); color: var(--text); }
    body.dark-mode .modal-inner { background: var(--card); }
    body.dark-mode .kw-bar { background: var(--accent); }
    body.dark-mode .badge-invoiced { background: rgba(61,107,79,0.35); color: #6DBD8A; }
    body.dark-mode .badge-unbilled { background: rgba(180,90,70,0.25); color: #D4806A; }
    body.dark-mode .app-pill { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.6); }
    body.dark-mode .app-pill.active { background: var(--accent); color: #1C1A17; }
    body.dark-mode .price-preview { background: var(--bg2); border-color: var(--border); }
    body.dark-mode .filters { background: var(--card); border-color: var(--border); }
    body.dark-mode .chart-card { background: var(--card); }
    body.dark-mode .table-wrap th { background: var(--bg2); }
    body.dark-mode .kpi { background: var(--card); }

    /* Dark mode toggle */
    #dm-toggle { position: absolute; bottom: 14px; right: 14px; background: rgba(255,255,255,0.08); border: none; color: rgba(255,255,255,0.55); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: background .2s; }
    #dm-toggle:hover { background: rgba(255,255,255,0.15); color: #fff; }

    /* ── Mobile hamburger ───────────────────────────── */
    #mobile-hamburger { display: none; position: fixed; top: 12px; left: 12px; z-index: 300; background: var(--text); color: #fff; border: none; width: 38px; height: 38px; border-radius: 8px; font-size: 18px; cursor: pointer; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.25); }
    #mobile-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 149; }
    #mobile-overlay.show { display: block; }

    /* ── Mobile responsive ──────────────────────────── */
    @media (max-width: 800px) {
      body { overflow-x: hidden; }
      #sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 150; transform: translateX(-100%); transition: transform .25s cubic-bezier(.4,0,.2,1); box-shadow: 4px 0 20px rgba(0,0,0,0.3); }
      #sidebar.mobile-open { transform: translateX(0); }
      #main { margin-left: 0 !important; padding-top: 56px; }
      #mobile-hamburger { display: flex; }
      .page { padding: 16px; }
      .kpi-grid-6 { grid-template-columns: repeat(2,1fr); }
      .kpi-grid-4 { grid-template-columns: repeat(2,1fr); }
      .kpi-grid-3 { grid-template-columns: repeat(2,1fr); }
      .charts-grid { grid-template-columns: 1fr !important; }
      .chart-card.chart-full { grid-column: span 1 !important; }
      .insight-cards { grid-template-columns: repeat(2,1fr); }
      .form-row { flex-direction: column; }
      .filters { flex-wrap: wrap; gap: 8px; }
    }
    @media (max-width: 480px) {
      .kpi-grid-6, .kpi-grid-4, .kpi-grid-3 { grid-template-columns: 1fr 1fr; }
      .insight-cards { grid-template-columns: 1fr 1fr; }
      .analytics-tabs { flex-wrap: wrap; }
    }

    /* ── Payment badges ─────────────────────────────── */
    .badge-paid { background: #EAF5EE; color: #2D7A4F; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; letter-spacing: 0.4px; }
    .badge-unpaid { background: #FBF1E8; color: #8B5A2B; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; letter-spacing: 0.4px; }
    body.dark-mode .badge-paid { background: rgba(45,122,79,0.25); color: #6DBD8A; }
    body.dark-mode .badge-unpaid { background: rgba(139,90,43,0.25); color: #D4A06A; }

    /* ── Recurring badge ────────────────────────────── */
    .badge-recurring { background: #EBF3FB; color: #2E6DA8; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; letter-spacing: 0.3px; }
    body.dark-mode .badge-recurring { background: rgba(46,109,168,0.2); color: #7AB4E0; }

    /* Analytics tabs */
    .analytics-tabs { display: flex; gap: 8px; margin-bottom: 22px; }
    .atab { padding: 9px 22px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text2); font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; box-shadow: var(--shadow); }
    .atab:hover { color: var(--text); border-color: var(--text2); opacity: 1; }
    .atab.active { background: var(--text); color: #fff; border-color: var(--text); }

    /* KPI grids */
    .kpi-grid { display: grid; gap: 12px; margin-bottom: 18px; }
    .kpi-grid-6 { grid-template-columns: repeat(6,1fr); }
    .kpi-grid-4 { grid-template-columns: repeat(4,1fr); }
    .kpi-grid-3 { grid-template-columns: repeat(3,1fr); }
    .kpi { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px 18px; border-left: 3px solid var(--border); }
    .kpi.gold  { border-left-color: var(--accent); }
    .kpi.green { border-left-color: var(--invoiced); }
    .kpi.blue  { border-left-color: #4A7A9B; }
    .kpi.red   { border-left-color: #8B3A3A; }
    .kpi-val { font-family: Georgia, serif; font-size: 20px; color: var(--text); margin-bottom: 3px; line-height: 1.1; }
    .kpi-val.gold  { color: var(--accent-dk); }
    .kpi-val.green { color: var(--invoiced); }
    .kpi-val.red   { color: var(--danger); }
    .kpi-sub { font-size: 10px; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text2); font-weight: 600; }
    .kpi-note { font-size: 11px; color: var(--text2); margin-top: 4px; }

    /* Charts 3-col */
    .charts-grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 16px; }
    .chart-card canvas.xtall { max-height: 380px; }

    /* Internal invoice */
    .internal-inv-row { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .internal-inv-row:last-child { border: none; }
    .internal-badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; background: #FBEBE8; color: #8B3C3C; margin-bottom: 10px; }

    /* File attachment badge */
    .file-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; border: none; transition: opacity .15s; }
    .file-badge:hover { opacity: 0.75; }
    .file-badge.pdf   { background: #FBEBE8; color: #8B3C3C; }
    .file-badge.img   { background: #EDF8F0; color: #2D6A4F; }
    .file-badge.doc   { background: #EBF3FB; color: #2E6DA8; }
    .file-badge.other { background: var(--bg2); color: var(--text2); }

    /* Section divider */
    .section-hd { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin: 26px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  </style>
</head>

  <div id="sidebar-brand">
    <div class="firm" id="sb-firm">JJ&amp;A Design Studio</div>
    <div class="sub">Studio Manager</div>
  </div>
  <div id="app-switcher">
    <button class="app-pill active" id="pill-time" onclick="switchApp('time')">Time</button>
    <button class="app-pill" id="pill-expenses" onclick="switchApp('expenses')">Expenses</button>
    <button class="app-pill" id="pill-analytics" onclick="switchApp('analytics')">Analytics</button>
  </div>
  <div id="sidebar-cta">
    <div id="sb-normal">
      <button class="btn-logtime" onclick="openEntryModal()">+ Log Time</button>
      <button class="btn-starttimer" onclick="openTimerModal()">⏱ Start Timer</button>

      <div class="timer-live">
        <div class="timer-top">
          <div class="timer-dot"></div>
          <div id="sb-elapsed">00:00:00</div>

        <button class="btn-stoptimer" onclick="stopTimer()">■ Stop &amp; Save</button>
      </div>
    </div>

</aside>

<button id="mobile-hamburger" onclick="toggleMobileMenu()">☰</button>
<div id="mobile-overlay" onclick="closeMobileMenu()"></div>
<main id="main"><div id="app"></div></main>
<div id="toast"></div>

<script>
/* ══════════════════════════════════════════════════════
   STORAGE
══════════════════════════════════════════════════════ */
const K = { entries:'tt_entries', clients:'tt_clients', designers:'tt_designers', projects:'tt_projects', invoices:'tt_invoices', settings:'tt_settings' };

const SYNC_KEYS = new Set(['tt_entries','tt_clients','tt_designers','tt_projects','tt_invoices','tt_settings','tt_expense_items','tt_expense_invoices','tt_expense_settings']);
const _cache = {};

const load  = (k,fb) => { if(k in _cache) return _cache[k]; try { return JSON.parse(localStorage.getItem(k)) ?? fb; } catch { return fb; } };
const store = (k,v)  => {
  _cache[k] = v;
  localStorage.setItem(k, JSON.stringify(v));
  if(_sb && SYNC_KEYS.has(k))(async()=>{ try{ await _sb.from('app_data').upsert({key:k,value:v,updated_at:new Date().toISOString()}); }catch(e){ console.error('Supabase write error:',e); } })();
};

const loadEntries   = () => load(K.entries,   []);
const loadClients   = () => load(K.clients,   []);
const loadDesigners = () => load(K.designers, []);
const loadProjects  = () => load(K.projects,  []);
const loadInvoices  = () => load(K.invoices,  []);
const loadSettings  = () => { const def={firmName:'JJ&A Design Studio',firmAddress:'',firmEmail:'',firmPhone:'',defaultRate:100,invoicePrefix:'INV',invoiceNext:1,currency:'USD',paymentTerms:14}; return {...def,...(load(K.settings,{})||{})}; };

const saveEntries   = v => store(K.entries,   v);
const saveClients   = v => store(K.clients,   v);
const saveDesigners = v => store(K.designers, v);
const saveProjects  = v => store(K.projects,  v);
const saveInvoices  = v => store(K.invoices,  v);
const saveSettings  = v => { store(K.settings, v); updateSidebarFirm(); };

const uid = () => crypto.randomUUID();

/* ══════════════════════════════════════════════════════
   CRUD — DESIGNERS
══════════════════════════════════════════════════════ */
const getDesignerById = id => loadDesigners().find(d => d.id===id);
const addDesigner    = d  => { const l=loadDesigners(); l.push({...d,id:uid(),createdAt:new Date().toISOString()}); saveDesigners(l); };
const updateDesigner = (id,c) => saveDesigners(loadDesigners().map(d=>d.id===id?{...d,...c}:d));
const deleteDesigner = id => saveDesigners(loadDesigners().filter(d=>d.id!==id));

/* ══════════════════════════════════════════════════════
   CRUD — CLIENTS
══════════════════════════════════════════════════════ */
const getClientById = id => loadClients().find(c => c.id===id);
const addClient    = c  => { const l=loadClients(); l.push({...c,id:uid(),createdAt:new Date().toISOString()}); saveClients(l); };
const updateClient = (id,c) => saveClients(loadClients().map(x=>x.id===id?{...x,...c}:x));
const deleteClient = id => { saveClients(loadClients().filter(c=>c.id!==id)); saveEntries(loadEntries().filter(e=>e.clientId!==id)); saveProjects(loadProjects().filter(p=>p.clientId!==id)); };

/* ══════════════════════════════════════════════════════
   CRUD — PROJECTS
══════════════════════════════════════════════════════ */
const getProjectById     = id  => loadProjects().find(p => p.id===id);
const getProjectsByClient = cid => loadProjects().filter(p => p.clientId===cid);
const addProject    = p  => { const l=loadProjects(); l.push({...p,id:uid(),createdAt:new Date().toISOString()}); saveProjects(l); };
const updateProject = (id,c) => saveProjects(loadProjects().map(p=>p.id===id?{...p,...c}:p));
const deleteProject = id => { saveProjects(loadProjects().filter(p=>p.id!==id)); loadEntries().filter(e=>e.projectId===id).forEach(e=>updateEntry(e.id,{projectId:'',projectText:getProjectById(id)?.name||''})); };

// Get project display name for an entry
function entryProjectName(e) {
  if (e.projectId) { const p=getProjectById(e.projectId); if(p) return p.name; }
  return e.projectText || e.project || '—';
}

/* ══════════════════════════════════════════════════════
   CRUD — ENTRIES
══════════════════════════════════════════════════════ */
const addEntry    = e  => { const l=loadEntries(); l.push({...e,id:uid(),createdAt:new Date().toISOString()}); saveEntries(l); };
const updateEntry = (id,c) => saveEntries(loadEntries().map(e=>e.id===id?{...e,...c}:e));
const deleteEntry = id => saveEntries(loadEntries().filter(e=>e.id!==id));

/* ══════════════════════════════════════════════════════
   CALCULATIONS
══════════════════════════════════════════════════════ */
function entryRate(e) {
  if (e.designerId) { const d=getDesignerById(e.designerId); if(d) return d.hourlyRate; }
  const c=getClientById(e.clientId); return c ? c.hourlyRate : 0;
}
const entryAmount = e => e.hours * entryRate(e);

function isInvoiced(entry) {
  return loadInvoices().some(inv =>
    inv.clientId === entry.clientId &&
    entry.date >= inv.startDate &&
    entry.date <= inv.endDate &&
    (!inv.designerId || inv.designerId === entry.designerId)
  );
}

/* ══════════════════════════════════════════════════════
   DATE UTILS
══════════════════════════════════════════════════════ */
const todayStr = () => new Date().toISOString().split('T')[0];

function weekRange(offset=0) {
  const now=new Date(); now.setDate(now.getDate()+offset*7);
  const day=now.getDay(), mon=new Date(now); mon.setDate(now.getDate()-(day===0?6:day-1));
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  return [mon.toISOString().split('T')[0], sun.toISOString().split('T')[0]];
}

function monthRange(offset=0) {
  const now=new Date(), y=now.getFullYear(), m=now.getMonth()+offset;
  return [new Date(y,m,1).toISOString().split('T')[0], new Date(y,m+1,0).toISOString().split('T')[0]];
}

const MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const ML=['January','February','March','April','May','June','July','August','September','October','November','December'];
const fmtDate     = iso => { if(!iso)return''; const [y,m,d]=iso.split('-'); return `${MS[+m-1]} ${+d}, ${y}`; };
const fmtDateLong = iso => { if(!iso)return''; const [y,m,d]=iso.split('-'); return `${ML[+m-1]} ${+d}, ${y}`; };
const CURRENCIES={USD:{symbol:'$',code:'USD',locale:'en-US'},EUR:{symbol:'€',code:'EUR',locale:'de-DE'},GBP:{symbol:'£',code:'GBP',locale:'en-GB'},CAD:{symbol:'CA$',code:'CAD',locale:'en-CA'},AUD:{symbol:'A$',code:'AUD',locale:'en-AU'},JPY:{symbol:'¥',code:'JPY',locale:'ja-JP'},CHF:{symbol:'CHF',code:'CHF',locale:'de-CH'}};
const cur = n => { try { const s=loadSettings(); const c=CURRENCIES[s.currency||'USD']||CURRENCIES.USD; return new Intl.NumberFormat(c.locale,{style:'currency',currency:c.code,minimumFractionDigits:c.code==='JPY'?0:2}).format(+(n||0)); } catch { return '$'+Number(n||0).toFixed(2); } };

function rangeFromKey(key) {
  if(key==='week')     return weekRange(0);
  if(key==='lastweek') return weekRange(-1);
  if(key==='month')    return monthRange(0);
  return ['',''];
}

// Get last N months labels + date ranges
function lastNMonths(n=12) {
  const months=[];
  for(let i=n-1;i>=0;i--){
    const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()-i);
    const y=d.getFullYear(), m=d.getMonth();
    months.push({label:`${MS[m]} ${y}`, start:new Date(y,m,1).toISOString().split('T')[0], end:new Date(y,m+1,0).toISOString().split('T')[0]});
  }
  return months;
}

// Get last N weeks labels + date ranges
function lastNWeeks(n=8) {
  const weeks=[];
  for(let i=n-1;i>=0;i--){
    const [s,e]=weekRange(-i);
    weeks.push({label:fmtDate(s).replace(/,\s*\d{4}/,''), start:s, end:e});
  }
  return weeks;
}

/* ══════════════════════════════════════════════════════
   FILTER ENTRIES
══════════════════════════════════════════════════════ */
function filterEntries({clientId='',designerId='',projectId='',start='',end='',status=''}={}) {
  return loadEntries().filter(e => {
    if(clientId   && e.clientId   !==clientId)   return false;
    if(designerId && e.designerId !==designerId)  return false;
    if(projectId  && e.projectId  !==projectId)   return false;
    if(start && e.date<start) return false;
    if(end   && e.date>end)   return false;
    if(status==='invoiced' && !isInvoiced(e)) return false;
    if(status==='unbilled' && isInvoiced(e))  return false;
    return true;
  }).sort((a,b)=>b.date.localeCompare(a.date));
}

/* ══════════════════════════════════════════════════════
   UI HELPERS
══════════════════════════════════════════════════════ */
let _tt;
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),2800);
}
function showModal(html) {
  const ov=document.createElement('div'); ov.className='overlay';
  ov.innerHTML=`<div class="modal">${html}</div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});
  document.body.appendChild(ov);
}
function closeModal(){ const m=document.querySelector('.overlay'); if(m)m.remove(); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function updateSidebarFirm(){ document.getElementById('sb-firm').textContent=loadSettings().firmName||'JJ&A Design Studio'; }

function clientOpts(sel='',allLabel='All Clients'){
  return `<option value="">${allLabel}</option>`+loadClients().map(c=>`<option value="${c.id}" ${c.id===sel?'selected':''}>${esc(c.name)}</option>`).join('');
}
function designerOpts(sel='',allLabel='All Designers'){
  return `<option value="">${allLabel}</option>`+loadDesigners().map(d=>`<option value="${d.id}" ${d.id===sel?'selected':''}>${esc(d.name)}</option>`).join('');
}
function projectOptsForClient(clientId,sel=''){
  const projs=getProjectsByClient(clientId);
  if(!projs.length) return `<option value="">— no projects for this client —</option>`;
  return `<option value="">Select a project…</option>`+projs.map(p=>`<option value="${p.id}" ${p.id===sel?'selected':''}>${esc(p.name)}</option>`).join('');
}
function allProjectOpts(sel='',allLabel='All Projects'){
  return `<option value="">${allLabel}</option>`+loadProjects().map(p=>`<option value="${p.id}" ${p.id===sel?'selected':''}>${esc(p.name)}</option>`).join('');
}

/* ══════════════════════════════════════════════════════
   ENTRY MODAL
══════════════════════════════════════════════════════ */
function openEntryModal(entryId) {
  const clients=loadClients(), designers=loadDesigners();
  if(!clients.length){ toast('Please add a client first'); navigate('#clients'); return; }
  const e=entryId?loadEntries().find(x=>x.id===entryId):null;

function saveEntryForm(editId) {
  const date=document.getElementById('e-date').value;
  const hours=parseFloat(document.getElementById('e-hrs').value);
  const clientId=document.getElementById('e-client').value;
  const desEl=document.getElementById('e-des');
  const designerId=desEl?desEl.value:'';
  const projSel=document.getElementById('e-proj-sel');
  const projTxt=document.getElementById('e-proj-text');
  const projectId  = projSel?projSel.value:'';
  const projectText= projTxt?projTxt.value.trim():'';
  const description=document.getElementById('e-desc').value.trim();
  const recurringEl=document.getElementById('e-recurring');
  const recurring=recurringEl?.checked?document.getElementById('e-recur-freq').value:'';
  if(!date||!clientId||(!projectId&&!projectText)||isNaN(hours)||hours<=0||!description){ toast('Please fill in all fields'); return; }
  const payload={date,hours,clientId,designerId,projectId,projectText,description,recurring};
  if(editId) updateEntry(editId,payload); else addEntry(payload);
  toast(editId?'Entry updated':'Time logged');
  closeModal(); render();
}

window.logAgain = entryId => {
  const entries=loadEntries();
  const e=entries.find(x=>x.id===entryId);
  if(!e) return;
  const newEntry={...e, id:crypto.randomUUID(), date:todayStr(), recurring:e.recurring};
  addEntry(newEntry);
  toast('Entry logged again for today');
  render();
};

/* ══════════════════════════════════════════════════════
   ENTRIES TABLE
══════════════════════════════════════════════════════ */
function entriesTableHtml(entries,{showDesigner=true,showClient=false,showProject=true,showActions=true}={}) {
  if(!entries.length) return `<div class="empty" style="padding:24px"><p class="col2">No entries found.</p></div>`;
  const cols=['Date'];
  if(showDesigner) cols.push('Designer');
  if(showClient)   cols.push('Client');
  if(showProject)  cols.push('Project');
  cols.push('Description','Hours','Amount','Status');
  if(showActions)  cols.push('');

  const rows=entries.map(e=>{
    const c=getClientById(e.clientId), d=e.designerId?getDesignerById(e.designerId):null;
    const inv=isInvoiced(e);
    const badge=inv?'<span class="badge badge-invoiced">Invoiced</span>':'<span class="badge badge-unbilled">Unbilled</span>';
    const recurBadge=e.recurring?`<span class="badge-recurring">↻ ${e.recurring}</span> `:'';
    const actions=showActions?`<td style="white-space:nowrap">
      <button class="btn btn-ghost btn-sm" onclick="openEntryModal('${e.id}')">Edit</button>
      ${e.recurring?`<button class="btn btn-ghost btn-sm" onclick="logAgain('${e.id}')" title="Log again today">↻</button>`:''}
      <button class="btn btn-danger btn-sm" onclick="confirmDelEntry('${e.id}')">Del</button></td>`:'';
    const tds=[`<td>${fmtDate(e.date)}</td>`];
    if(showDesigner) tds.push(`<td>${d?esc(d.name):'<span class="col2">—</span>'}</td>`);
    if(showClient)   tds.push(`<td>${c?esc(c.name):'<span class="col2">—</span>'}</td>`);
    if(showProject)  tds.push(`<td>${esc(entryProjectName(e))}</td>`);
    tds.push(`<td class="col2" style="max-width:220px">${recurBadge}${esc(e.description)}</td>`,`<td>${e.hours}h</td>`,`<td class="gold-txt">${cur(entryAmount(e))}</td>`,`<td>${badge}</td>`);
    if(showActions) tds.push(actions);
    return `<tr>${tds.join('')}</tr>`;
  }).join('');

  const totH=entries.reduce((s,e)=>s+e.hours,0);
  const totA=entries.reduce((s,e)=>s+entryAmount(e),0);
  const skipCols=cols.length-(showActions?3:2);
  const footTds=[`<td colspan="${skipCols}"></td>`,`<td><strong>${totH.toFixed(1)}h</strong></td>`,`<td class="gold-txt"><strong>${cur(totA)}</strong></td>`,`<td></td>`];
  if(showActions) footTds.push(`<td></td>`);

  return `<div class="tbl-wrap"><table>
    <thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr class="tbl-footer">${footTds.join('')}</tr></tfoot>
  </table></div>`;
}

function confirmDelEntry(id){
  if(confirm('Delete this entry?')){ deleteEntry(id); toast('Entry deleted'); render(); }
}

function renderDashboard(){

  const recent=[...all].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,6);

  const rows=recent.length?recent.map(e=>{
    const c=getClientById(e.clientId), d=e.designerId?getDesignerById(e.designerId):null, inv=isInvoiced(e);

  }).join(''):`<tr><td colspan="7" class="col2" style="text-align:center;padding:24px">No entries yet — click <strong>Log Time</strong> to get started</td></tr>`;

  document.getElementById('app').innerHTML=`
    <div class="page-head"><div><h1>Dashboard</h1><div class="sub">Week of ${fmtDate(ws)} – ${fmtDate(we)}</div></div><button class="btn btn-gold" onclick="openEntryModal()">+ Log Time</button></div>
    <div class="stats">
      <div class="stat"><div class="val">${wH.toFixed(1)}</div><div class="lbl">Hours this week</div></div>
      <div class="stat"><div class="val">${wC}</div><div class="lbl">Active clients</div></div>
      <div class="stat"><div class="val gold">${cur(wR)}</div><div class="lbl">Revenue this week</div></div>
      <div class="stat"><div class="val gold">${cur(wU)}</div><div class="lbl">Unbilled this week</div></div>
    </div>
    <div class="card"><div class="card-head"><h2>Recent Entries</h2></div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Date</th><th>Client</th><th>Designer</th><th>Project</th><th>Hours</th><th>Amount</th><th>Status</th></tr></thead>
        <tbody>${rows}</tbody>

function renderProjects(){
  const clients=loadClients(), projects=loadProjects(), entries=loadEntries();
  if(!clients.length){
    document.getElementById('app').innerHTML=`<div class="page-head"><div><h1>Projects</h1></div></div><div class="empty"><div class="e-icon">◧</div><p>Add clients first, then create projects for them.</p><button class="btn btn-gold" onclick="navigate('#clients')">Go to Clients</button></div>`;
    return;
  }

  const active=projects.filter(p=>p.status!=='completed');
  const completed=projects.filter(p=>p.status==='completed');

  function clientFor(p){ return clients.find(c=>c.id===p.clientId)||{name:'Unknown',id:''}; }

  // Group active by client
  const byClient={};
  clients.forEach(c=>{byClient[c.id]={client:c,projs:[]};});
  active.forEach(p=>{if(byClient[p.clientId])byClient[p.clientId].projs.push(p);});

  const activeHtml=Object.values(byClient).map(({client:c,projs})=>{
    const cards=projs.map(p=>projCardHtml(p,c,entries)).join('')
      ||`<p class="col2 fs12" style="padding:10px 2px">No active projects. <button class="btn btn-ghost btn-sm" onclick="openProjectModal('','${c.id}')">+ Add one</button></p>`;
    return `<div class="proj-group"><div class="proj-group-label">${esc(c.name)}</div>${cards}</div>`;
  }).join('');

  const completedHtml=completed.length?`
    <div class="completed-section-hd">Completed Projects (${completed.length})</div>

window.toggleProjectStatus = (id, checkbox) => {
  const p=getProjectById(id);

  updateProject(id,{status: nowCompleted?'completed':'active'});

  // Update UI in place without full re-render
  const card=document.getElementById(`projcard-${id}`);
  const lbl=document.getElementById(`togl-${id}`);
  if(card){
    card.classList.toggle('completed', nowCompleted);
    const nameEl=card.querySelector('.proj-name');

    const badge=card.querySelector('.badge');
    if(badge){ badge.className='badge '+(nowCompleted?'badge-gold':'badge-invoiced'); badge.textContent=nowCompleted?'Completed':'Active'; }
  }

  if(nowCompleted){
    toast(`"${p.name}" marked as completed 🎉`);

    const el=checkbox.closest('.toggle-switch');
    if(el){

      const y=rect.top/window.innerHeight;
      confetti({particleCount:180,spread:120,origin:{x,y},colors:RAINBOW,startVelocity:55,gravity:0.75,ticks:350,scalar:1.1});
      setTimeout(()=>{confetti({particleCount:100,spread:90,origin:{x:0.05,y:0.5},colors:RAINBOW,startVelocity:60,angle:70,gravity:0.8,ticks:280});confetti({particleCount:100,spread:90,origin:{x:0.95,y:0.5},colors:RAINBOW,startVelocity:60,angle:110,gravity:0.8,ticks:280});},180);
      setTimeout(()=>confetti({particleCount:130,spread:150,origin:{x:0.5,y:0.05},colors:RAINBOW,startVelocity:40,gravity:0.85,ticks:260}),380);
      setTimeout(()=>{confetti({particleCount:90,spread:80,origin:{x:0.2,y:0.1},colors:RAINBOW,startVelocity:50,angle:50,gravity:0.9,ticks:220});confetti({particleCount:90,spread:80,origin:{x:0.8,y:0.1},colors:RAINBOW,startVelocity:50,angle:130,gravity:0.9,ticks:220});},560);
      setTimeout(()=>confetti({particleCount:250,spread:220,origin:{x:0.5,y:-0.05},colors:RAINBOW,startVelocity:28,gravity:1.1,ticks:200}),780);

function renderHours(){
  document.getElementById('app').innerHTML=`
    <div class="page-head"><div><h1>All Hours</h1><div class="sub">Total billable hours across all designers and projects</div></div><button class="btn btn-gold" onclick="openEntryModal()">+ Log Time</button></div>
    <div class="filters">

      <select id="h-des" onchange="rebuildHours()">${designerOpts('','All Designers')}</select>
      <div class="sep"></div>
      <label class="field-label">Client</label>
      <select id="h-cli" onchange="rebuildHours();populateHoursProjectFilter()">${clientOpts('','All Clients')}</select>
      <label class="field-label">Project</label>
      <select id="h-proj" onchange="rebuildHours()">${allProjectOpts('','All Projects')}</select>
      <div class="sep"></div>
      <label class="field-label">Period</label>
      <select id="h-range" onchange="rebuildHours()">
        <option value="week">This Week</option><option value="lastweek">Last Week</option>
        <option value="month">This Month</option><option value="all">All Time</option>
      </select>
      <select id="h-status" onchange="rebuildHours()">
        <option value="">All Entries</option><option value="unbilled">Unbilled Only</option><option value="invoiced">Invoiced Only</option>
      </select>
      <input type="text" id="h-q" placeholder="Search…" oninput="rebuildHours()">
    </div>
    <div id="hours-body"></div>`;

  window.populateHoursProjectFilter=()=>{
    const cliId=document.getElementById('h-cli').value;
    const projs=cliId?getProjectsByClient(cliId):loadProjects();
    const sel=document.getElementById('h-proj');
    sel.innerHTML=`<option value="">All Projects</option>`+projs.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
  };

  window.rebuildHours=()=>{
    const desId=document.getElementById('h-des').value;
    const cliId=document.getElementById('h-cli').value;
    const projId=document.getElementById('h-proj').value;
    const rangeKey=document.getElementById('h-range').value;
    const status=document.getElementById('h-status').value;
    const q=(document.getElementById('h-q').value||'').toLowerCase();
    const [start,end]=rangeFromKey(rangeKey);

    let entries=filterEntries({designerId:desId,clientId:cliId,projectId:projId,start,end,status});
    if(q) entries=entries.filter(e=>{
      const c=getClientById(e.clientId),d=e.designerId?getDesignerById(e.designerId):null;
      return [c?.name||'',d?.name||'',entryProjectName(e),e.description].join(' ').toLowerCase().includes(q);
    });

    const el=document.getElementById('hours-body');
    if(!entries.length){el.innerHTML=`<div class="empty"><div class="e-icon">◷</div><p>No entries match your filters.</p><button class="btn btn-gold" onclick="openEntryModal()">+ Log Time</button></div>`;return;}

    const byClient={};
    entries.forEach(e=>{(byClient[e.clientId]||(byClient[e.clientId]=[])).push(e);});
    let html='', grandH=0, grandA=0;

    Object.entries(byClient).forEach(([cid,ces])=>{
      const c=getClientById(cid);
      const totH=ces.reduce((s,e)=>s+e.hours,0), totA=ces.reduce((s,e)=>s+entryAmount(e),0);
      grandH+=totH; grandA+=totA;
      html+=`<div class="cgroup">
        <div class="cgroup-hd" onclick="toggleGroup(this)">
          <span class="name">${esc(c?.name||'Unknown')}</span>
          <span class="meta"><span>${totH.toFixed(1)} hrs</span><strong>${cur(totA)}</strong><span class="chevron">▾</span></span>
        </div>
        <div>${entriesTableHtml(ces,{showDesigner:!desId,showClient:false,showProject:!projId})}</div>
      </div>`;
    });

    html+=`<div class="card" style="text-align:right;padding:12px 20px"><span class="col2 fs12">Grand Total &nbsp;</span><strong>${grandH.toFixed(1)} hours</strong>&nbsp;&nbsp;<span class="col2 fs12">Revenue &nbsp;</span><span class="gold-txt" style="font-size:17px"><strong>${cur(grandA)}</strong></span></div>`;
    el.innerHTML=html;
  };

  rebuildHours();
}
function toggleGroup(hd){hd.classList.toggle('collapsed');const b=hd.nextElementSibling;b.style.display=b.style.display==='none'?'':'none';}

/* ══════════════════════════════════════════════════════
   PDF GENERATOR
══════════════════════════════════════════════════════ */
function generatePDF(){
  const clientId=document.getElementById('gi-cli').value;
  const designerId=document.getElementById('gi-des').value;
  const projectId=document.getElementById('gi-proj').value;
  let {rangeKey,start,end}=window._gen;
  if(rangeKey==='custom'){start=document.getElementById('gi-s').value;end=document.getElementById('gi-e').value;}
  const c=getClientById(clientId), designer=designerId?getDesignerById(designerId):null;
  const entries=filterEntries({clientId,designerId,projectId,start,end});
  const settings=loadSettings();
  if(!entries.length){toast('No entries for this period');return;}

  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'letter'});
  const PW=215.9,M=20,R=PW-M;
  const invNum=`${settings.invoicePrefix}-${String(settings.invoiceNext).padStart(4,'0')}`;
  const issueDate=todayStr(), dueD=new Date(issueDate); dueD.setDate(dueD.getDate()+14);
  const dueDate=dueD.toISOString().split('T')[0];

  doc.setFontSize(18);doc.setFont('helvetica','bold');doc.setTextColor(20,20,18);
  doc.text(settings.firmName||'Your Firm',M,26);
  doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(100,100,95);
  let iy=32;
  if(settings.firmAddress){doc.text(settings.firmAddress,M,iy);iy+=5;}
  if(settings.firmEmail){doc.text(settings.firmEmail,M,iy);iy+=5;}
  if(settings.firmPhone){doc.text(settings.firmPhone,M,iy);}

  doc.setFontSize(22);doc.setFont('helvetica','bold');doc.setTextColor(196,168,122);
  doc.text('INVOICE',R,26,{align:'right'});
  doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(100,100,95);
  doc.text(`Invoice #: ${invNum}`,R,33,{align:'right'});
  doc.text(`Date: ${fmtDateLong(issueDate)}`,R,38,{align:'right'});
  doc.text(`Due: ${fmtDateLong(dueDate)}`,R,43,{align:'right'});

  doc.setDrawColor(220,215,205);doc.setLineWidth(0.4);doc.line(M,52,R,52);
  doc.setFontSize(7.5);doc.setFont('helvetica','bold');doc.setTextColor(130,125,118);doc.text('BILL TO',M,59);
  doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(20,20,18);doc.text(c.name,M,65);
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(90,85,80);
  let by=71;
  if(c.contactName){doc.text(c.contactName,M,by);by+=5;}
  if(c.email){doc.text(c.email,M,by);by+=5;}
  if(designer){doc.text(`Designer: ${designer.name}`,M,by);}
  doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(130,125,118);
  doc.text(`Billing Period: ${fmtDateLong(start)} – ${fmtDateLong(end)}`,R,65,{align:'right'});

  const body=entries.map(e=>{
    const d=e.designerId?getDesignerById(e.designerId):null;
    return[fmtDate(e.date),d?d.name:'—',entryProjectName(e),e.description,`${e.hours}h`,`${cur(entryRate(e))}/hr`,cur(entryAmount(e))];
  });

  doc.autoTable({startY:88,head:[['Date','Designer','Project','Description','Hours','Rate','Amount']],body,margin:{left:M,right:M},
    styles:{fontSize:8.5,cellPadding:3.5,textColor:[30,28,24]},
    headStyles:{fillColor:[30,28,24],textColor:[255,255,255],fontStyle:'bold',fontSize:8},
    columnStyles:{0:{cellWidth:22},1:{cellWidth:25},2:{cellWidth:28},3:{cellWidth:'auto',overflow:'linebreak'},4:{cellWidth:14,halign:'right'},5:{cellWidth:20,halign:'right'},6:{cellWidth:22,halign:'right'}},
    alternateRowStyles:{fillColor:[249,248,245]}});

  const aft=doc.lastAutoTable.finalY+8;
  const totH=entries.reduce((s,e)=>s+e.hours,0), totA=entries.reduce((s,e)=>s+entryAmount(e),0);
  doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(110,105,98);
  doc.text('Total Hours:',R-40,aft);doc.text(`${totH.toFixed(1)}h`,R,aft,{align:'right'});
  doc.setDrawColor(220,215,205);doc.line(R-45,aft+4,R,aft+4);
  doc.setFontSize(12);doc.setFont('helvetica','bold');doc.setTextColor(20,20,18);doc.text('Total Due:',R-40,aft+10);
  doc.setTextColor(168,140,94);doc.text(cur(totA),R,aft+10,{align:'right'});
  doc.setFontSize(8);doc.setFont('helvetica','italic');doc.setTextColor(160,155,148);
  doc.setDrawColor(220,215,205);doc.line(M,258,R,258);
  doc.text('Thank you for your business. Payment due within 14 days.',PW/2,263,{align:'center'});

  const invRecord={id:uid(),invoiceNumber:invNum,clientId,designerId:designerId||null,projectId:projectId||null,startDate:start,endDate:end,totalHours:totH,totalAmount:totA,generatedAt:new Date().toISOString()};
  const il=loadInvoices(); il.push(invRecord); saveInvoices(il);
  settings.invoiceNext+=1; saveSettings(settings);
  doc.save(`${invNum}-${c.name.replace(/\s+/g,'-')}.pdf`);
  toast(`${invNum} downloaded`);
}

/* ── TIME ANALYTICS ─────────────────────────────────── */
function buildTimeAnalytics(){
  const el=document.getElementById('analytics-tab-content');
  el.innerHTML=`
    <div class="filters" style="margin-bottom:16px">
      <label class="field-label">Period</label>
      <select id="ta-range" onchange="rebuildTimeA()">
        <option value="all">All Time</option>
        <option value="ytd">Year to Date</option>
        <option value="month" selected>This Month</option>
        <option value="lastmonth">Last Month</option>
        <option value="week">This Week</option>
      </select>
      <label class="field-label">Client</label>
      <select id="ta-cli" onchange="rebuildTimeA()">${clientOpts('','All Clients')}</select>
      <label class="field-label">Designer</label>
      <select id="ta-des" onchange="rebuildTimeA()">${designerOpts('','All Designers')}</select>
    </div>
    <div id="time-a-body"></div>`;
  window.rebuildTimeA=()=>{
    destroyCharts();
    const rk=document.getElementById('ta-range').value;
    const cliId=document.getElementById('ta-cli').value;
    const desId=document.getElementById('ta-des').value;
    let start='',end='';
    if(rk==='ytd'){start=`${new Date().getFullYear()}-01-01`;end=todayStr();}
    else if(rk==='lastmonth'){const[s,e]=monthRange(-1);start=s;end=e;}
    else if(rk!=='all'){[start,end]=rangeFromKey(rk);}
    const entries=filterEntries({clientId:cliId,designerId:desId,start,end});
    buildTimeABody(entries,{cliId,desId});
  };
  rebuildTimeA();
}

function buildTimeABody(entries,{cliId,desId}){
  const el=document.getElementById('time-a-body');
  if(!entries.length){el.innerHTML=`<div class="empty"><div class="e-icon">◑</div><p>No data for this period.</p><button class="btn btn-gold" onclick="openEntryModal()">+ Log Time</button></div>`;return;}
  const allE=loadEntries();
  const totH=entries.reduce((s,e)=>s+e.hours,0);
  const totA=entries.reduce((s,e)=>s+entryAmount(e),0);
  const invH=entries.filter(e=>isInvoiced(e)).reduce((s,e)=>s+e.hours,0);
  const invA=entries.filter(e=>isInvoiced(e)).reduce((s,e)=>s+entryAmount(e),0);
  const unbA=totA-invA;
  const avgRate=totH>0?totA/totH:0;
  const topClientObj=(()=>{const m={};entries.forEach(e=>{m[e.clientId]=(m[e.clientId]||0)+entryAmount(e);});const top=Object.entries(m).sort((a,b)=>b[1]-a[1])[0];return top?{name:getClientById(top[0])?.name||'?',val:top[1]}:null;})();
  const topDesObj=(()=>{const m={};entries.filter(e=>e.designerId).forEach(e=>{const n=getDesignerById(e.designerId)?.name||'?';m[n]=(m[n]||0)+e.hours;});const top=Object.entries(m).sort((a,b)=>b[1]-a[1])[0];return top?{name:top[0],val:top[1]}:null;})();
  const atH=allE.reduce((s,e)=>s+e.hours,0);
  const atA=allE.reduce((s,e)=>s+entryAmount(e),0);
  const weeks52=lastNWeeks(52);
  const activeWks=weeks52.filter(w=>allE.some(e=>e.date>=w.start&&e.date<=w.end)).length||1;
  const avgWkH=atH/activeWks;
  const months12=lastNMonths(12);
  const monthRevData=months12.map(m=>allE.filter(e=>e.date>=m.start&&e.date<=m.end&&(!cliId||e.clientId===cliId)&&(!desId||e.designerId===desId)).reduce((s,e)=>s+entryAmount(e),0));
  const bestMoIdx=monthRevData.reduce((bi,v,i)=>v>monthRevData[bi]?i:bi,0);
  const ytdStart=`${new Date().getFullYear()}-01-01`;
  const ytdH=allE.filter(e=>e.date>=ytdStart&&(!cliId||e.clientId===cliId)&&(!desId||e.designerId===desId)).reduce((s,e)=>s+e.hours,0);
  const ytdA=allE.filter(e=>e.date>=ytdStart&&(!cliId||e.clientId===cliId)&&(!desId||e.designerId===desId)).reduce((s,e)=>s+entryAmount(e),0);
  const topProjObj=(()=>{const m={};entries.forEach(e=>{const n=entryProjectName(e)||'—';m[n]=(m[n]||0)+entryAmount(e);});const top=Object.entries(m).sort((a,b)=>b[1]-a[1])[0];return top?{name:top[0],val:top[1]}:null;})();

  el.innerHTML=`
    <div class="kpi-grid kpi-grid-6" style="margin-bottom:10px">
      <div class="kpi gold"><div class="kpi-val gold">${cur(totA)}</div><div class="kpi-sub">Revenue (Period)</div></div>
      <div class="kpi"><div class="kpi-val">${totH.toFixed(1)}h</div><div class="kpi-sub">Hours (Period)</div></div>
      <div class="kpi green"><div class="kpi-val green">${cur(invA)}</div><div class="kpi-sub">Invoiced</div></div>
      <div class="kpi red"><div class="kpi-val red">${cur(unbA)}</div><div class="kpi-sub">Unbilled</div></div>
      <div class="kpi"><div class="kpi-val">${(totH>0?(invH/totH*100):0).toFixed(0)}%</div><div class="kpi-sub">% Invoiced</div></div>
      <div class="kpi"><div class="kpi-val">${entries.length}</div><div class="kpi-sub">Entries</div></div>
    </div>
    <div class="kpi-grid kpi-grid-6" style="margin-bottom:10px">
      <div class="kpi"><div class="kpi-val">${cur(avgRate)}/h</div><div class="kpi-sub">Effective Rate</div></div>
      <div class="kpi"><div class="kpi-val">${avgWkH.toFixed(1)}h</div><div class="kpi-sub">Avg Hrs/Week</div></div>
      <div class="kpi gold"><div class="kpi-val gold">${cur(ytdA)}</div><div class="kpi-sub">YTD Revenue</div></div>
      <div class="kpi"><div class="kpi-val">${ytdH.toFixed(1)}h</div><div class="kpi-sub">YTD Hours</div></div>
      <div class="kpi gold"><div class="kpi-val gold">${cur(atA)}</div><div class="kpi-sub">All-Time Revenue</div></div>
      <div class="kpi"><div class="kpi-val">${atH.toFixed(1)}h</div><div class="kpi-sub">All-Time Hours</div></div>
    </div>
    <div class="kpi-grid kpi-grid-4" style="margin-bottom:20px">
      <div class="kpi"><div class="kpi-val">${esc(topClientObj?.name||'—')}</div><div class="kpi-sub">Top Client (Revenue)</div>${topClientObj?`<div class="kpi-note">${cur(topClientObj.val)}</div>`:''}</div>
      <div class="kpi"><div class="kpi-val">${esc(topDesObj?.name||'—')}</div><div class="kpi-sub">Most Active Designer</div>${topDesObj?`<div class="kpi-note">${topDesObj.val.toFixed(1)}h</div>`:''}</div>
      <div class="kpi"><div class="kpi-val">${esc(topProjObj?.name||'—')}</div><div class="kpi-sub">Top Project (Revenue)</div>${topProjObj?`<div class="kpi-note">${cur(topProjObj.val)}</div>`:''}</div>
      <div class="kpi gold"><div class="kpi-val gold">${cur(monthRevData[bestMoIdx]||0)}</div><div class="kpi-sub">Best Month</div><div class="kpi-note">${months12[bestMoIdx]?.label||'—'}</div></div>
    </div>
    <div class="charts-grid">
      <div class="chart-card"><h3>Revenue by Client</h3><canvas id="ch-revClient"></canvas></div>
      <div class="chart-card"><h3>Invoiced vs Unbilled ($)</h3><canvas id="ch-invStatus"></canvas></div>
      <div class="chart-card"><h3>Hours by Designer</h3><canvas id="ch-byDesigner"></canvas></div>
      <div class="chart-card"><h3>Hours by Project (Top 10)</h3><canvas id="ch-byProject"></canvas></div>
      <div class="chart-card chart-full"><h3>Monthly Revenue — Last 12 Months</h3><canvas id="ch-monthRevenue" class="tall"></canvas></div>
      <div class="chart-card chart-full"><h3>Weekly Hours — Last 16 Weeks</h3><canvas id="ch-overTime" class="tall"></canvas></div>
      <div class="chart-card chart-full"><h3>Keyword Analysis — Where Your Hours Go</h3><div id="kw-analysis"></div></div>
    </div>`;

  // Revenue by client (bar)
  const byClientRev={};entries.forEach(e=>{const n=getClientById(e.clientId)?.name||'?';byClientRev[n]=(byClientRev[n]||0)+entryAmount(e);});
  const crE=Object.entries(byClientRev).sort((a,b)=>b[1]-a[1]);
  window._charts.revClient=new Chart(document.getElementById('ch-revClient'),{type:'bar',data:{labels:crE.map(([n])=>n),datasets:[{data:crE.map(([,v])=>v),backgroundColor:CHART_PALETTE,borderRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:v=>'$'+v.toLocaleString()},grid:{color:'#F2F0EB'}},x:{grid:{display:false}}}}});
  // Invoiced vs unbilled $
  window._charts.invStatus=new Chart(document.getElementById('ch-invStatus'),{type:'doughnut',data:{labels:['Invoiced','Unbilled'],datasets:[{data:[invA,unbA],backgroundColor:['#3D6B4F','#C4A87A'],borderWidth:1,borderColor:'#fff'}]},options:{responsive:true,plugins:{legend:{position:'right',labels:{boxWidth:12,font:{size:11}}}}}});
  // Hours by designer
  const byDes={};entries.forEach(e=>{const n=e.designerId?getDesignerById(e.designerId)?.name||'?':'Unassigned';byDes[n]=(byDes[n]||0)+e.hours;});
  const dE=Object.entries(byDes).sort((a,b)=>b[1]-a[1]);
  window._charts.byDes=new Chart(document.getElementById('ch-byDesigner'),{type:'bar',data:{labels:dE.map(([n])=>n),datasets:[{data:dE.map(([,v])=>v),backgroundColor:CHART_PALETTE,borderRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'#F2F0EB'}},x:{grid:{display:false}}}}});
  // Hours by project (horizontal)
  const byProj={};entries.forEach(e=>{const n=entryProjectName(e)||'—';byProj[n]=(byProj[n]||0)+e.hours;});
  const pE=Object.entries(byProj).sort((a,b)=>b[1]-a[1]).slice(0,10);
  window._charts.byProj=new Chart(document.getElementById('ch-byProject'),{type:'bar',data:{labels:pE.map(([n])=>n),datasets:[{data:pE.map(([,v])=>v),backgroundColor:CHART_PALETTE,borderRadius:4}]},options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,grid:{color:'#F2F0EB'}},y:{grid:{display:false}}}}});
  // Monthly revenue bar
  window._charts.monthRev=new Chart(document.getElementById('ch-monthRevenue'),{type:'bar',data:{labels:months12.map(m=>m.label),datasets:[{label:'Revenue',data:monthRevData,backgroundColor:'rgba(196,168,122,0.75)',borderColor:'#C4A87A',borderWidth:1,borderRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:v=>'$'+v.toLocaleString()},grid:{color:'#F2F0EB'}},x:{grid:{display:false}}}}});
  // Weekly hours line
  const weeks16=lastNWeeks(16);
  const wkData=weeks16.map(w=>allE.filter(e=>e.date>=w.start&&e.date<=w.end&&(!cliId||e.clientId===cliId)&&(!desId||e.designerId===desId)).reduce((s,e)=>s+e.hours,0));
  window._charts.wkHours=new Chart(document.getElementById('ch-overTime'),{type:'line',data:{labels:weeks16.map(w=>w.label),datasets:[{label:'Hours',data:wkData,borderColor:'#C4A87A',backgroundColor:'rgba(196,168,122,0.08)',fill:true,tension:0.35,pointBackgroundColor:'#C4A87A',pointRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'#F2F0EB'}},x:{grid:{display:false}}}}});
  // Keywords
  const kwMap={};entries.forEach(e=>{const words=(e.description||'').toLowerCase().replace(/[^a-z\s]/g,' ').split(/\s+/).filter(w=>w.length>2&&!STOP_WORDS.has(w));const seen=new Set();words.forEach(w=>{if(seen.has(w))return;seen.add(w);if(!kwMap[w])kwMap[w]={count:0,hours:0,amount:0};kwMap[w].count++;kwMap[w].hours+=e.hours;kwMap[w].amount+=entryAmount(e);});});
  const kwArr=Object.entries(kwMap).sort((a,b)=>b[1].hours-a[1].hours).slice(0,24);
  const maxKH=kwArr[0]?kwArr[0][1].hours:1;
  document.getElementById('kw-analysis').innerHTML=kwArr.length?`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">${kwArr.map(([kw,{count,hours,amount}])=>`<div style="padding:8px 10px;background:var(--bg);border-radius:6px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-weight:600;font-size:12px">${esc(kw)}</span><span class="col2" style="font-size:11px">${hours.toFixed(1)}h · ${cur(amount)}</span></div><div class="kw-bar" style="width:${Math.round(hours/maxKH*100)}%"></div><div class="col2" style="font-size:10px;margin-top:3px">${count} entr${count===1?'y':'ies'}</div></div>`).join('')}</div>`:'<p class="col2 fs12">Not enough data.</p>';
}

  window._charts.expVsClient=new Chart(document.getElementById('ch-expVsClient'),{type:'bar',data:{labels:cNames,datasets:[{label:'Vendor Cost',data:cNames.map(n=>byClientV[n]||0),backgroundColor:'rgba(107,102,96,0.65)',borderRadius:2},{label:'Client Billing',data:cNames.map(n=>byClientC[n]||0),backgroundColor:'rgba(196,168,122,0.85)',borderRadius:2}]},options:{responsive:true,plugins:{legend:{position:'top'}},scales:{x:{stacked:false,grid:{display:false}},y:{beginAtZero:true,ticks:{callback:v=>'$'+v.toLocaleString()},grid:{color:'#F2F0EB'}}}}});

/* ── COMBINED ANALYTICS ─────────────────────────────── */
function buildCombinedAnalytics(){
  const el=document.getElementById('analytics-tab-content');
  destroyCharts();
  const allE=loadEntries(), allI=loadExpItems();
  const timeRevTotal=allE.reduce((s,e)=>s+entryAmount(e),0);
  const timeRevInv=allE.filter(e=>isInvoiced(e)).reduce((s,e)=>s+entryAmount(e),0);
  const timeRevUnb=timeRevTotal-timeRevInv;
  const totalH=allE.reduce((s,e)=>s+e.hours,0);
  const expVendorTotal=allI.reduce((s,i)=>s+i.vendorAmount,0);
  const expClientTotal=allI.reduce((s,i)=>s+calcItem(i).clientTotal,0);
  const expMarkup=expClientTotal-expVendorTotal;

/* ══════════════════════════════════════════════════════
   EXPORT / IMPORT (FULL — ALL APPS)
══════════════════════════════════════════════════════ */
function exportAllData() {
  const keys=['tt_entries','tt_clients','tt_designers','tt_projects','tt_invoices','tt_settings','tt_expense_items','tt_expense_invoices','tt_expense_settings','tt_dark_mode','tt_app'];
  const data={_version:2,_exported:new Date().toISOString()};
  keys.forEach(k=>{ const v=localStorage.getItem(k); if(v) data[k]=v; });
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`jja-full-backup-${todayStr()}.json`;a.click();
  URL.revokeObjectURL(a.href);
  toast('Full backup exported');
}
function importAllData(input) {
  const f=input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    try {
      const data=JSON.parse(ev.target.result);
      if(!confirm('Import backup? This will replace all current data.')) return;
      Object.entries(data).forEach(([k,v])=>{ if(!k.startsWith('_')&&v) localStorage.setItem(k,v); });
      toast('Import complete — reloading...');
      setTimeout(()=>location.reload(),1000);
    } catch { toast('Invalid backup file'); }
  };
  r.readAsText(f);
}

/* ══════════════════════════════════════════════════════
   INDEXEDDB — VENDOR FILES (local fallback for old files)
══════════════════════════════════════════════════════ */
let _db = null;
function getDB() {
  if (_db) return Promise.resolve(_db);
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('jja_tracker_db', 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('vendor_files'))
        db.createObjectStore('vendor_files', {keyPath:'id'});
    };
    req.onsuccess = e => { _db = e.target.result; resolve(_db); };
    req.onerror   = e => reject(e.target.error);
  });
}
const idbPut    = data => getDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction('vendor_files','readwrite');tx.objectStore('vendor_files').put(data).onsuccess=e=>res(e.target.result);tx.onerror=e=>rej(e);}));
const idbGet    = id   => getDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction('vendor_files','readonly');tx.objectStore('vendor_files').get(id).onsuccess=e=>res(e.target.result);tx.onerror=e=>rej(e);}));
const idbGetAll = ()   => getDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction('vendor_files','readonly');tx.objectStore('vendor_files').getAll().onsuccess=e=>res(e.target.result);tx.onerror=e=>rej(e);}));
const idbDelete = id   => getDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction('vendor_files','readwrite');tx.objectStore('vendor_files').delete(id).onsuccess=()=>res();tx.onerror=e=>rej(e);}));

async function uploadToSupabase(itemId, fileData) {
  if(!_sb) throw new Error('Supabase not loaded');
  const { file, name, type } = fileData;
  const safeName = name.replace(/[^a-zA-Z0-9.\-_]/g, '_');
  const path = `${itemId}/${Date.now()}-${safeName}`;

  // Upload the raw File object directly
  const { error } = await _sb.storage.from(SUPABASE_BUCKET).upload(path, file, {
    contentType: type, upsert: true
  });
  if(error) throw error;

  const { data } = _sb.storage.from(SUPABASE_BUCKET).getPublicUrl(path);
  const publicUrl = data.publicUrl;

  // Remove old file from Supabase if replacing
  const existing = getExpItemById(itemId);
  if(existing?.filePath && existing.filePath !== path) {
    _sb.storage.from(SUPABASE_BUCKET).remove([existing.filePath]).catch(()=>{});
  }

  updateExpItem(itemId, { hasFile: true, hasPdf: true, fileName: name, fileType: type, fileUrl: publicUrl, filePath: path });
  toast(`✓ ${name} uploaded`);
  renderExpItems();
}

async function deleteSupabaseFile(filePath) {
  if(!_sb || !filePath) return;
  await _sb.storage.from(SUPABASE_BUCKET).remove([filePath]).catch(()=>{});
}

const getExpItemById  = id    => loadExpItems().find(i=>i.id===id);
const addExpItem      = item  => { const l=loadExpItems(); l.push({...item,id:uid(),createdAt:new Date().toISOString(),status:'filed'}); saveExpItems(l); };
const updateExpItem   = (id,c)=> saveExpItems(loadExpItems().map(i=>i.id===id?{...i,...c}:i));
const deleteExpItem   = id    => { saveExpItems(loadExpItems().filter(i=>i.id!==id)); idbDelete(id).catch(()=>{}); };

function calcItem(item) {
  const v = item.vendorAmount||0;
  const afterMarkup  = v * (1 + (item.markupPct||0)/100);
  const clientTotal  = afterMarkup * (1 + (item.adminFeePct||0)/100);
  return { vendorAmount:v, markupAmt:afterMarkup-v, adminAmt:clientTotal-afterMarkup, clientTotal };
}

window.updateExpPreview = () => {
  const v=parseFloat(document.getElementById('ei-amt')?.value)||0;

  const a=parseFloat(document.getElementById('ei-admin')?.value)||0;
